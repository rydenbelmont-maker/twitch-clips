<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Pro Clip Viewer</title>
    <!-- Technical Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            overflow: hidden; width: 100%; height: 100%; font-family: 'Inter', sans-serif;
        }
        #root { width: 100%; height: 100%; }
        .video-wrapper {
            position: relative; width: 100%; height: 100%; background: #000;
        }
        iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
            z-index: 1;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        .game-art-float { animation: float 5s ease-in-out infinite; }
        
        /* Invisible settings trigger - top left */
        .settings-area {
            position: absolute; top: 0; left: 0; width: 150px; height: 150px;
            z-index: 100; opacity: 0; transition: opacity 0.3s ease;
        }
        .settings-area:hover { opacity: 1; }
        
        .overlay-vignette {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 25%);
            pointer-events: none; z-index: 10;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t'
        };

        const Spinner = () => (
            <div className="w-12 h-12 border-4 border-purple-600 border-t-transparent rounded-full animate-spin"></div>
        );

        const App = () => {
            const [clip, setClip] = useState(null);
            const [gameArt, setGameArt] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showMenu, setShowMenu] = useState(false);
            const [clipArchive, setClipArchive] = useState([]); // Full searchable database
            const [indexing, setIndexing] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            // Settings initialized from LocalStorage
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('ryden_v4_settings');
                return saved ? JSON.parse(saved) : {
                    duration: 60,
                    range: 100,
                    timeRange: 'all',
                    excludedIds: [],
                    includedIds: [],
                    shuffle: true
                };
            });

            const timerRef = useRef(null);

            // Persist settings
            useEffect(() => {
                localStorage.setItem('ryden_v4_settings', JSON.stringify(settings));
            }, [settings]);

            // Fetch box art for the game
            const fetchGameArt = async (gameId) => {
                if (!gameId) return;
                try {
                    const res = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, {
                        headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                    });
                    const data = await res.json();
                    if (data.data?.length > 0) {
                        setGameArt(data.data[0].box_art_url.replace('{width}', '300').replace('{height}', '400'));
                    }
                } catch (e) { console.error("Art load failed", e); }
            };

            // Index history for the Search Menu (800 clips)
            const buildDatabase = async () => {
                setIndexing(true);
                try {
                    let collected = [];
                    let cursor = '';
                    for (let i = 0; i < 8; i++) {
                        const res = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${CONFIG.broadcasterId}&first=100${cursor ? `&after=${cursor}` : ''}`, {
                            headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                        });
                        const data = await res.json();
                        if (data.data) collected = [...collected, ...data.data];
                        cursor = data.pagination?.cursor;
                        if (!cursor) break;
                    }
                    setClipArchive(collected);
                } catch (e) { console.error("Database build failed", e); }
                finally { setIndexing(false); }
            };

            const pickNextClip = useCallback(async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({ broadcaster_id: CONFIG.broadcasterId, first: settings.range });
                    const now = new Date();
                    if (settings.timeRange === '7d') now.setDate(now.getDate() - 7);
                    else if (settings.timeRange === '30d') now.setMonth(now.getMonth() - 1);
                    else if (settings.timeRange === 'year') now.setFullYear(now.getFullYear() - 1);
                    if (settings.timeRange !== 'all') params.append('started_at', now.toISOString());

                    const res = await fetch(`https://api.twitch.tv/helix/clips?${params.toString()}`, {
                        headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                    });
                    const data = await res.json();
                    let pool = data.data || [];

                    // Apply inclusion (Pin) filters
                    if (settings.includedIds.length > 0) {
                        pool = pool.filter(c => settings.includedIds.includes(c.id));
                        // If pinned clips aren't in the recent fetch, fetch them specifically
                        if (pool.length === 0) {
                            const specRes = await fetch(`https://api.twitch.tv/helix/clips?id=${settings.includedIds.join('&id=')}`, {
                                headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                            });
                            const specData = await specRes.json();
                            pool = specData.data || [];
                        }
                    }
                    
                    // Apply exclusion (Ban) filters
                    if (settings.excludedIds.length > 0) {
                        pool = pool.filter(c => !settings.excludedIds.includes(c.id));
                    }

                    if (pool.length > 0) {
                        const selection = settings.shuffle ? pool[Math.floor(Math.random() * pool.length)] : pool[0];
                        setClip(selection);
                        fetchGameArt(selection.game_id);
                    }
                } catch (e) { console.error("Rotation failed", e); }
                finally { setLoading(false); }
            }, [settings]);

            // Auto-advance timer
            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(pickNextClip, settings.duration * 1000);
                return () => clearInterval(timerRef.current);
            }, [settings.duration, pickNextClip]);

            useEffect(() => { pickNextClip(); }, []);

            const getEmbedUrl = (c) => {
                if (!c) return '';
                const host = window.location.hostname;
                // High-precision parent list per implementation protocol
                const parents = [host, 'rydenbelmont-maker.github.io', 'localhost', '127.0.0.1'];
                const parentStr = [...new Set(parents)].filter(p => p).map(p => `&parent=${p}`).join('');
                
                // Construct specific clip embed URL
                return `https://clips.twitch.tv/embed?clip=${c.id}${parentStr}&autoplay=true&muted=false`;
            };

            const toggleFilter = (id, key) => {
                setSettings(prev => ({
                    ...prev,
                    [key]: prev[key].includes(id) ? prev[key].filter(x => x !== id) : [...prev[key], id]
                }));
            };

            const filteredArchive = useMemo(() => {
                if (!searchQuery) return [];
                return clipArchive.filter(c => c.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [searchQuery, clipArchive]);

            useEffect(() => { if (typeof lucide !== 'undefined') lucide.createIcons(); });

            return (
                <div className="relative w-full h-full bg-black group overflow-hidden">
                    {/* Settings Trigger Area */}
                    <div className="settings-area p-8">
                        <button 
                            onClick={() => { setShowMenu(true); if(clipArchive.length === 0) buildDatabase(); }}
                            className="bg-black/60 hover:bg-black p-4 rounded-2xl border border-white/10 backdrop-blur-md text-white/40 hover:text-purple-500 shadow-2xl transition-all"
                        >
                            <i data-lucide="settings" className="w-6 h-6"></i>
                        </button>
                    </div>

                    {/* Management UI */}
                    {showMenu && (
                        <div className="absolute inset-0 z-[200] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6" onClick={() => setShowMenu(false)}>
                            <div className="w-full max-w-5xl max-h-[85vh] bg-[#0d0d0f] border border-white/10 rounded-[3rem] p-12 space-y-10 shadow-2xl relative flex flex-col" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowMenu(false)} className="absolute top-12 right-12 text-zinc-600 hover:text-white transition-colors">
                                    <i data-lucide="x" className="w-7 h-7"></i>
                                </button>

                                <div className="space-y-2">
                                    <h3 className="text-4xl font-black tracking-tighter text-white uppercase italic italic">Control Console</h3>
                                    <div className="flex items-center gap-4 text-[10px] text-zinc-600 font-black tracking-[0.4em] uppercase">
                                        <span>v4.0.0 Stable</span>
                                        <div className="w-1 h-1 rounded-full bg-zinc-800"></div>
                                        <span>Ryden Belmont Architecture</span>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-2 gap-12 overflow-hidden flex-1">
                                    <div className="space-y-8 overflow-y-auto pr-4 custom-scrollbar">
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Rotation Speed (S)</label>
                                                <input type="number" value={settings.duration} onChange={(e) => setSettings({...settings, duration: Number(e.target.value)})} className="w-full bg-black border border-white/5 rounded-2xl px-5 py-4 text-sm font-bold focus:ring-1 focus:ring-purple-600 outline-none transition-all"/>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Time Window</label>
                                                <select value={settings.timeRange} onChange={(e) => setSettings({...settings, timeRange: e.target.value})} className="w-full bg-black border border-white/5 rounded-2xl px-5 py-4 text-xs font-bold focus:ring-1 focus:ring-purple-600 outline-none cursor-pointer appearance-none">
                                                    <option value="all">Featured / All Time</option>
                                                    <option value="7d">Last 7 Days</option>
                                                    <option value="30d">Last 30 Days</option>
                                                    <option value="year">This Year</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest flex justify-between items-center">
                                                Search Archive Database
                                                {indexing && <span className="animate-pulse text-purple-600">Indexing...</span>}
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    placeholder="Search title to Pin or Ban..." 
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                    className="w-full bg-black border border-white/10 rounded-2xl pl-14 pr-6 py-5 text-sm font-medium focus:ring-1 focus:ring-purple-600 outline-none"
                                                />
                                                <i data-lucide="search" className="absolute left-5 top-5 text-zinc-600 w-5 h-5"></i>
                                            </div>
                                            
                                            <div className="space-y-2 h-72 overflow-y-auto custom-scrollbar pr-2">
                                                {indexing ? (
                                                    <div className="text-center py-20 opacity-50 uppercase text-[10px] font-black tracking-widest">Loading History...</div>
                                                ) : searchQuery.length < 2 ? (
                                                    <div className="text-center py-20 text-[10px] text-zinc-700 uppercase font-black tracking-widest italic">Start typing to search clips...</div>
                                                ) : filteredArchive.length > 0 ? (
                                                    filteredArchive.map(c => (
                                                        <div key={c.id} className="bg-white/5 p-3 rounded-2xl border border-white/5 flex items-center gap-5 hover:bg-white/10 transition-all">
                                                            <img src={c.thumbnail_url} className="w-20 h-12 rounded-xl object-cover shadow-lg" />
                                                            <div className="flex-1 overflow-hidden">
                                                                <p className="text-[11px] font-bold truncate text-white">{c.title}</p>
                                                                <p className="text-[9px] text-zinc-600 mt-1 uppercase font-black">{new Date(c.created_at).toLocaleDateString()}</p>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => toggleFilter(c.id, 'includedIds')} className={`p-2.5 rounded-xl border transition-all ${settings.includedIds.includes(c.id) ? 'bg-green-600 border-green-400 text-white' : 'border-white/10 text-zinc-700 hover:text-green-500'}`}><i data-lucide="check" className="w-4 h-4"></i></button>
                                                                <button onClick={() => toggleFilter(c.id, 'excludedIds')} className={`p-2.5 rounded-xl border transition-all ${settings.excludedIds.includes(c.id) ? 'bg-red-600 border-red-400 text-white' : 'border-white/10 text-zinc-700 hover:text-red-500'}`}><i data-lucide="slash" className="w-4 h-4"></i></button>
                                                            </div>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-center py-20 text-[10px] text-zinc-700 font-black tracking-widest">No results found</div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white/5 rounded-[3rem] border border-white/5 p-10 flex flex-col justify-between">
                                        <div className="space-y-8">
                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest italic">Live Ruleset Summary</label>
                                            <div className="space-y-4">
                                                <div className="p-6 bg-purple-600/5 border border-purple-500/20 rounded-[2rem]">
                                                    <p className="text-[9px] text-purple-400 mb-2 uppercase font-black tracking-widest">Host Origin</p>
                                                    <p className="text-white font-mono text-base font-bold">{window.location.hostname || "localhost"}</p>
                                                </div>
                                                <div className="grid grid-cols-2 gap-4">
                                                    <div className={`p-6 rounded-[2rem] border transition-all ${settings.includedIds.length > 0 ? 'bg-green-600/10 border-green-500/30' : 'bg-black/40 border-white/5 opacity-50'}`}>
                                                        <p className="text-[8px] text-zinc-600 mb-2 uppercase font-black tracking-widest">Pinned</p>
                                                        <p className="text-2xl font-black text-white">{settings.includedIds.length}</p>
                                                    </div>
                                                    <div className={`p-6 rounded-[2rem] border transition-all ${settings.excludedIds.length > 0 ? 'bg-red-600/10 border-red-500/30' : 'bg-black/40 border-white/5 opacity-50'}`}>
                                                        <p className="text-[8px] text-zinc-600 mb-2 uppercase font-black tracking-widest">Banned</p>
                                                        <p className="text-2xl font-black text-white">{settings.excludedIds.length}</p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => { pickNextClip(); setShowMenu(false); }} className="w-full bg-white text-black py-6 rounded-[2rem] font-black text-xs uppercase tracking-[0.4em] hover:bg-purple-600 hover:text-white transition-all shadow-2xl active:scale-95">Commit & Sync</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Media Interface */}
                    <div className="video-wrapper">
                        {clip ? (
                            <iframe 
                                key={clip.id} 
                                src={getEmbedUrl(clip)} 
                                allowFullScreen 
                                allow="autoplay; fullscreen"
                                className="w-full h-full"
                            ></iframe>
                        ) : (
                            <div className="w-full h-full flex flex-col items-center justify-center bg-black gap-6">
                                <Spinner />
                                <span className="text-[10px] font-black uppercase tracking-[0.6em] text-zinc-700 italic animate-pulse">Syncing Archive...</span>
                            </div>
                        )}
                    </div>

                    {/* Metadata Layer */}
                    {clip && !showMenu && (
                        <div className="absolute inset-0 overlay-vignette flex items-end p-10 md:p-16">
                            <div className="max-w-5xl animate-in fade-in slide-in-from-bottom-8 duration-1000">
                                <div className="flex flex-col gap-5">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-purple-600 px-4 py-2 rounded-lg shadow-xl shadow-purple-500/30">
                                            <span className="text-[9px] font-black uppercase tracking-[0.3em] italic text-white leading-none">Featured Asset</span>
                                        </div>
                                        <div className="h-[1px] w-12 bg-white/20"></div>
                                        <span className="text-[11px] text-zinc-500 font-black uppercase tracking-[0.4em]">{clip.creator_name}</span>
                                    </div>
                                    <div className="flex items-center gap-8 text-[11px] md:text-sm font-black uppercase tracking-[0.3em] text-zinc-600 italic">
                                        <div className="flex items-center gap-2.5">
                                            <i data-lucide="eye" className="w-4 h-4 text-purple-600"></i>
                                            <span className="text-zinc-200">{clip.view_count.toLocaleString()} Views</span>
                                        </div>
                                        <div className="flex items-center gap-2.5">
                                            <i data-lucide="calendar" className="w-4 h-4 text-purple-600"></i>
                                            <span className="text-zinc-200">{new Date(clip.created_at).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Game Box Art Layer */}
                    {gameArt && !showMenu && (
                        <div className="absolute bottom-12 right-12 md:bottom-20 md:right-20 w-32 md:w-48 game-art-float pointer-events-none z-[20]">
                            <div className="p-2 bg-white/10 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.8)] ring-1 ring-white/20 overflow-hidden">
                                <img src={gameArt} alt="Game Box Art" className="w-full h-auto rounded-[2rem] shadow-lg opacity-90 grayscale-[0.2] contrast-[1.1]" />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
