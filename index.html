<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Pro Clip Viewer</title>
    <!-- Dependencies per Technical Architecture -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; background-color: #000; color: #fff; 
            overflow: hidden; width: 100%; height: 100%; font-family: 'Inter', sans-serif;
        }
        #root { width: 100%; height: 100%; }
        .video-container {
            position: relative; width: 100%; height: 100%; background: #000;
        }
        iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
            z-index: 1;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1deg); }
        }
        .game-art-float { animation: float 6s ease-in-out infinite; }
        
        .settings-trigger {
            opacity: 0; transition: opacity 0.3s ease; cursor: pointer; z-index: 100;
        }
        .settings-trigger:hover { opacity: 1; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar { display: none; }
        
        .overlay-gradient {
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 30%, transparent 100%);
            pointer-events: none; z-index: 10;
        }

        .unmute-pill {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t'
        };

        const Spinner = ({ className = "w-8 h-8" }) => (
            <div className={`border-2 border-purple-600 border-t-transparent rounded-full animate-spin ${className}`}></div>
        );

        const App = () => {
            const [clip, setClip] = useState(null);
            const [gameArt, setGameArt] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showMenu, setShowMenu] = useState(false);
            const [fullClipCache, setFullClipCache] = useState([]);
            const [searching, setSearching] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [isUserMuted, setIsUserMuted] = useState(true);

            // Persistent Settings
            const [settings, setSettings] = useState(() => {
                const saved = localStorage.getItem('ryden_clip_settings');
                return saved ? JSON.parse(saved) : {
                    duration: 60,
                    range: 100,
                    timeRange: 'all',
                    excludedIds: [],
                    includedIds: [],
                    shuffle: true,
                    startMuted: true // Set to TRUE to force browser autoplay approval
                };
            });

            const timerRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('ryden_clip_settings', JSON.stringify(settings));
            }, [settings]);

            const fetchGameArt = async (gameId) => {
                if (!gameId) return;
                try {
                    const gameRes = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });
                    const gameData = await gameRes.json();
                    if (gameData.data.length > 0) {
                        const url = gameData.data[0].box_art_url.replace('{width}', '300').replace('{height}', '400');
                        setGameArt(url);
                    }
                } catch (err) { console.error("Art Error:", err); }
            };

            const buildSearchDatabase = async () => {
                setSearching(true);
                try {
                    let clips = [];
                    let cursor = '';
                    for (let i = 0; i < 8; i++) { // Fetch up to 800 for deep indexing
                        const url = `https://api.twitch.tv/helix/clips?broadcaster_id=${CONFIG.broadcasterId}&first=100${cursor ? `&after=${cursor}` : ''}`;
                        const response = await fetch(url, {
                            headers: {
                                'Client-ID': CONFIG.clientId,
                                'Authorization': `Bearer ${CONFIG.accessToken}`
                            }
                        });
                        const data = await response.json();
                        if (data.data) clips = [...clips, ...data.data];
                        cursor = data.pagination?.cursor;
                        if (!cursor) break;
                    }
                    setFullClipCache(clips);
                } catch (err) { console.error("Database Error:", err); }
                finally { setSearching(false); }
            };

            const pickRandomClip = useCallback(async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({
                        broadcaster_id: CONFIG.broadcasterId,
                        first: settings.range
                    });

                    const now = new Date();
                    if (settings.timeRange === '7d') now.setDate(now.getDate() - 7);
                    else if (settings.timeRange === '30d') now.setMonth(now.getMonth() - 1);
                    else if (settings.timeRange === 'year') now.setFullYear(now.getFullYear() - 1);
                    
                    if (settings.timeRange !== 'all') params.append('started_at', now.toISOString());

                    const response = await fetch(`https://api.twitch.tv/helix/clips?${params.toString()}`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });
                    const data = await response.json();
                    let pool = data.data || [];

                    if (settings.includedIds.length > 0) {
                        pool = pool.filter(c => settings.includedIds.includes(c.id));
                        if (pool.length === 0) {
                            const specificRes = await fetch(`https://api.twitch.tv/helix/clips?id=${settings.includedIds.join('&id=')}`, {
                                headers: {
                                    'Client-ID': CONFIG.clientId,
                                    'Authorization': `Bearer ${CONFIG.accessToken}`
                                }
                            });
                            const specData = await specificRes.json();
                            pool = specData.data || [];
                        }
                    }
                    
                    if (settings.excludedIds.length > 0) {
                        pool = pool.filter(c => !settings.excludedIds.includes(c.id));
                    }

                    if (pool.length > 0) {
                        const next = settings.shuffle ? pool[Math.floor(Math.random() * pool.length)] : pool[0];
                        setClip(next);
                        fetchGameArt(next.game_id);
                    }
                } catch (err) { console.error("Rotation Error:", err); }
                finally { setLoading(false); }
            }, [settings]);

            useEffect(() => { pickRandomClip(); }, []);

            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => { pickRandomClip(); }, settings.duration * 1000);
                return () => clearInterval(timerRef.current);
            }, [settings.duration, pickRandomClip]);

            const getEmbedUrl = (c) => {
                if (!c) return '';
                const host = window.location.hostname;
                // Technical Protocol: Multiple parents to ensure handshake success
                const parents = [host, 'rydenbelmont-maker.github.io', 'localhost', '127.0.0.1'];
                const parentParams = [...new Set(parents)].filter(p => p).map(p => `&parent=${p}`).join('');
                
                // Constructing Non-Interactive Frame URL
                // We use isUserMuted to manage the initial browser block
                return `${c.embed_url}${parentParams}&autoplay=true&muted=${isUserMuted}&preload=auto`;
            };

            const toggleId = (id, listKey) => {
                setSettings(prev => ({
                    ...prev,
                    [listKey]: prev[listKey].includes(id)
                        ? prev[listKey].filter(i => i !== id)
                        : [...prev[listKey], id]
                }));
            };

            const handleInteraction = () => {
                if (isUserMuted) {
                    setIsUserMuted(false);
                }
            };

            useEffect(() => {
                if (typeof lucide !== 'undefined') lucide.createIcons();
            });

            return (
                <div className="relative w-full h-full group overflow-hidden bg-black" onClick={handleInteraction}>
                    {/* Hover Trigger for Control Panel */}
                    <div className="absolute top-0 left-0 w-40 h-40 z-[100] settings-trigger p-8 flex items-start">
                        <button 
                            onClick={(e) => { e.stopPropagation(); setShowMenu(true); if(fullClipCache.length === 0) buildSearchDatabase(); }}
                            className="bg-black/60 hover:bg-black/90 p-4 rounded-[1.5rem] border border-white/10 backdrop-blur-md transition-all text-white/40 hover:text-purple-500 shadow-2xl"
                        >
                            <i data-lucide="settings" className="w-6 h-6"></i>
                        </button>
                    </div>

                    {/* Mute Indicator (Interaction Unlocker) */}
                    {isUserMuted && clip && (
                        <div className="absolute top-8 right-8 z-[100] unmute-pill">
                            <button 
                                onClick={handleInteraction}
                                className="bg-purple-600/90 text-white px-5 py-2.5 rounded-full flex items-center gap-3 shadow-2xl backdrop-blur-md hover:bg-purple-500 transition-all font-black text-[10px] uppercase tracking-widest"
                            >
                                <i data-lucide="volume-x" className="w-4 h-4"></i>
                                Click to Unmute
                            </button>
                        </div>
                    )}

                    {/* Pro Settings Menu Overlay */}
                    {showMenu && (
                        <div className="absolute inset-0 z-[200] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6" onClick={() => setShowMenu(false)}>
                            <div className="w-full max-w-5xl max-h-[85vh] bg-[#09090b] border border-white/10 rounded-[3.5rem] p-10 md:p-14 space-y-10 shadow-2xl relative overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowMenu(false)} className="absolute top-12 right-12 text-zinc-600 hover:text-white transition-colors">
                                    <i data-lucide="x" className="w-7 h-7"></i>
                                </button>

                                <div className="space-y-2">
                                    <h3 className="text-4xl font-black tracking-tighter text-white uppercase italic leading-none">Management Console</h3>
                                    <p className="text-[10px] text-zinc-600 font-black tracking-[0.5em] uppercase">Architecture v3.0 // Ryden Belmont Control</p>
                                </div>

                                <div className="grid md:grid-cols-2 gap-12 overflow-hidden flex-1">
                                    <div className="space-y-8 overflow-y-auto pr-4 custom-scrollbar">
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Rotation Rate (S)</label>
                                                <input type="number" value={settings.duration} onChange={(e) => setSettings({...settings, duration: Number(e.target.value)})} className="w-full bg-black border border-white/5 rounded-2xl px-5 py-4 text-sm focus:ring-1 focus:ring-purple-600 outline-none transition-all font-bold"/>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Archive Range</label>
                                                <select value={settings.timeRange} onChange={(e) => setSettings({...settings, timeRange: e.target.value})} className="w-full bg-black border border-white/5 rounded-2xl px-5 py-4 text-xs focus:ring-1 focus:ring-purple-600 outline-none appearance-none cursor-pointer font-bold">
                                                    <option value="all">Featured // All Time</option>
                                                    <option value="7d">Last 7 Days</option>
                                                    <option value="30d">Last 30 Days</option>
                                                    <option value="year">This Year</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest flex justify-between items-center">
                                                Deep Search Database
                                                {searching && <span className="animate-pulse text-purple-600 font-black">Indexing...</span>}
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    placeholder="Search title to Pin or Ban..." 
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                    className="w-full bg-black border border-white/10 rounded-2xl pl-14 pr-6 py-5 text-sm focus:ring-1 focus:ring-purple-600 outline-none transition-all"
                                                />
                                                <i data-lucide="search" className="absolute left-5 top-5 text-zinc-600 w-5 h-5"></i>
                                            </div>
                                            
                                            <div className="space-y-2 h-72 overflow-y-auto custom-scrollbar pr-2">
                                                {searching ? (
                                                    <div className="text-center py-24"><Spinner className="mx-auto" /></div>
                                                ) : fullClipCache.filter(c => c.title.toLowerCase().includes(searchQuery.toLowerCase())).length > 0 ? (
                                                    fullClipCache.filter(c => c.title.toLowerCase().includes(searchQuery.toLowerCase())).map(c => (
                                                        <div key={c.id} className="bg-white/5 p-3 rounded-2xl border border-white/5 flex items-center gap-5 hover:bg-white/10 transition-all group">
                                                            <div className="relative w-20 h-12 shrink-0">
                                                                <img src={c.thumbnail_url} className="w-full h-full rounded-xl object-cover" />
                                                            </div>
                                                            <div className="flex-1 overflow-hidden">
                                                                <p className="text-[11px] font-bold truncate text-white leading-tight">{c.title}</p>
                                                                <p className="text-[9px] text-zinc-600 mt-1 uppercase font-black">{new Date(c.created_at).toLocaleDateString()}</p>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => toggleId(c.id, 'includedIds')} className={`p-2.5 rounded-xl border transition-all ${settings.includedIds.includes(c.id) ? 'bg-green-600 border-green-400 text-white' : 'border-white/10 text-zinc-700 hover:text-green-500'}`}><i data-lucide="check" className="w-4 h-4"></i></button>
                                                                <button onClick={() => toggleId(c.id, 'excludedIds')} className={`p-2.5 rounded-xl border transition-all ${settings.excludedIds.includes(c.id) ? 'bg-red-600 border-red-400 text-white' : 'border-white/10 text-zinc-700 hover:text-red-500'}`}><i data-lucide="slash" className="w-4 h-4"></i></button>
                                                            </div>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-center py-20 text-[10px] text-zinc-700 uppercase font-black tracking-widest italic">
                                                        {searchQuery ? "No matching data found" : "Type to filter the archive..."}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-white/5 rounded-[3rem] border border-white/5 p-10 flex flex-col justify-between">
                                        <div className="space-y-8">
                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest italic">Live Session Rules</label>
                                            
                                            <div className="space-y-5">
                                                <div className="p-6 bg-purple-600/5 border border-purple-500/20 rounded-[2rem]">
                                                    <p className="text-[9px] text-purple-400 mb-2 uppercase font-black tracking-[0.2em]">Active Parent Domain</p>
                                                    <p className="text-white font-bold text-lg font-mono">{window.location.hostname || "Unknown"}</p>
                                                </div>

                                                <div className="grid grid-cols-2 gap-5">
                                                    <div className={`p-6 rounded-[2rem] border transition-all ${settings.includedIds.length > 0 ? 'bg-green-600/10 border-green-500/30' : 'bg-black/40 border-white/5 opacity-50'}`}>
                                                        <p className="text-[8px] text-zinc-600 mb-2 uppercase font-black tracking-widest">Pinned Pool</p>
                                                        <p className="text-2xl font-black text-white">{settings.includedIds.length}</p>
                                                    </div>
                                                    <div className={`p-6 rounded-[2rem] border transition-all ${settings.excludedIds.length > 0 ? 'bg-red-600/10 border-red-500/30' : 'bg-black/40 border-white/5 opacity-50'}`}>
                                                        <p className="text-[8px] text-zinc-600 mb-2 uppercase font-black tracking-widest">Banned List</p>
                                                        <p className="text-2xl font-black text-white">{settings.excludedIds.length}</p>
                                                    </div>
                                                </div>

                                                <div className="p-6 bg-black/40 border border-white/5 rounded-[2rem] text-center">
                                                    <p className="text-[8px] text-zinc-600 mb-2 uppercase font-black tracking-widest">Auto-Rotate Status</p>
                                                    <p className="text-xs font-black text-purple-500 tracking-widest uppercase animate-pulse">Running every {settings.duration}s</p>
                                                </div>
                                            </div>
                                        </div>

                                        <button 
                                            onClick={() => { pickRandomClip(); setShowMenu(false); }} 
                                            className="w-full bg-white text-black py-6 rounded-[2rem] font-black text-xs uppercase tracking-[0.4em] hover:bg-purple-600 hover:text-white transition-all shadow-2xl active:scale-95"
                                        >
                                            Commit Changes
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* The Media Player (Architecture Protocol Ref: 11) */}
                    <div className="video-container">
                        {clip ? (
                            <iframe 
                                key={`${clip.id}-${isUserMuted}`} 
                                src={getEmbedUrl(clip)} 
                                allowFullScreen 
                                allow="autoplay; fullscreen"
                                className="w-full h-full"
                            ></iframe>
                        ) : (
                            <div className="w-full h-full flex items-center justify-center bg-black">
                                <div className="flex flex-col items-center gap-6">
                                    <Spinner className="w-16 h-16" />
                                    <p className="text-[10px] font-black uppercase tracking-[0.5em] text-zinc-700 italic animate-pulse">Initialising Feed...</p>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Pro Data Overlay */}
                    {clip && !showMenu && (
                        <div className="absolute inset-0 overlay-gradient flex items-end p-10 md:p-16">
                            <div className="max-w-5xl animate-in fade-in slide-in-from-bottom-8 duration-1000">
                                <div className="flex flex-col gap-6">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-purple-600 px-4 py-2 rounded-lg shadow-xl shadow-purple-500/30">
                                            <span className="text-[10px] font-black uppercase tracking-[0.2em] italic text-white leading-none">Featured Asset</span>
                                        </div>
                                        <div className="h-[1px] w-12 bg-white/20"></div>
                                        <span className="text-[11px] text-zinc-500 font-black uppercase tracking-[0.4em]">{clip.creator_name}</span>
                                    </div>
                                    <div className="flex items-center gap-10 text-[11px] md:text-sm font-black uppercase tracking-[0.4em] text-zinc-600 italic">
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="eye" className="w-4 h-4 text-purple-600"></i>
                                            <span className="text-zinc-200">{clip.view_count.toLocaleString()} Views</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="calendar" className="w-4 h-4 text-purple-600"></i>
                                            <span className="text-zinc-200 uppercase">{new Date(clip.created_at).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Game Asset Rendering (Implementation Protocol Ref: 11) */}
                    {gameArt && !showMenu && (
                        <div className="absolute bottom-12 right-12 md:bottom-20 md:right-20 w-32 md:w-48 game-art-float pointer-events-none z-[20]">
                            <div className="p-2 bg-white/10 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.8)] ring-1 ring-white/20 overflow-hidden">
                                <img src={gameArt} alt="Game Box Art" className="w-full h-auto rounded-[2rem] shadow-lg opacity-90 grayscale-[0.2] contrast-[1.1]" />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
