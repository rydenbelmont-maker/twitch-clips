<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Pro Clip Viewer</title>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { 
            margin: 0;
            padding: 0;
            background-color: #000; 
            color: #fff; 
            overflow: hidden; 
            width: 100%;
            height: 100%;
        }
        #root { width: 100%; height: 100%; }
        iframe { border: none; width: 100%; height: 100%; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .game-art-float { animation: float 4s ease-in-out infinite; }
        
        /* Hidden settings area - only visible on hover */
        .settings-trigger {
            opacity: 0;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        .settings-trigger:hover {
            opacity: 1;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t'
        };

        const Spinner = ({ className = "w-8 h-8" }) => (
            <div className={`border-2 border-purple-600 border-t-transparent rounded-full animate-spin ${className}`}></div>
        );

        const App = () => {
            const [clip, setClip] = useState(null);
            const [gameArt, setGameArt] = useState(null);
            const [loading, setLoading] = useState(true);
            const [showMenu, setShowMenu] = useState(false);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [fullClipCache, setFullClipCache] = useState([]); // Database for searching
            const [searching, setSearching] = useState(false);

            const [settings, setSettings] = useState({
                duration: 60,
                range: 100,
                timeRange: 'all', // all, 7d, 30d, year
                excludedIds: [],
                includedIds: [],
                shuffle: true
            });

            const timerRef = useRef(null);

            // Fetch game art for the current clip
            const fetchGameArt = async (gameId) => {
                if (!gameId) return;
                try {
                    const gameRes = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });
                    const gameData = await gameRes.json();
                    if (gameData.data.length > 0) {
                        const url = gameData.data[0].box_art_url.replace('{width}', '300').replace('{height}', '400');
                        setGameArt(url);
                    }
                } catch (err) {
                    console.error("Game art failed", err);
                }
            };

            // Deep search database builder
            const buildSearchDatabase = async () => {
                setSearching(true);
                try {
                    let clips = [];
                    let cursor = '';
                    // Fetch up to 500 clips for a thorough search pool
                    for (let i = 0; i < 5; i++) {
                        const url = `https://api.twitch.tv/helix/clips?broadcaster_id=${CONFIG.broadcasterId}&first=100${cursor ? `&after=${cursor}` : ''}`;
                        const response = await fetch(url, {
                            headers: {
                                'Client-ID': CONFIG.clientId,
                                'Authorization': `Bearer ${CONFIG.accessToken}`
                            }
                        });
                        const data = await response.json();
                        clips = [...clips, ...data.data];
                        cursor = data.pagination?.cursor;
                        if (!cursor) break;
                    }
                    setFullClipCache(clips);
                } catch (err) {
                    console.error("Database build failed", err);
                } finally {
                    setSearching(false);
                }
            };

            const pickRandomClip = useCallback(async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({
                        broadcaster_id: CONFIG.broadcasterId,
                        first: settings.range
                    });

                    const now = new Date();
                    if (settings.timeRange === '7d') {
                        now.setDate(now.getDate() - 7);
                        params.append('started_at', now.toISOString());
                    } else if (settings.timeRange === '30d') {
                        now.setMonth(now.getMonth() - 1);
                        params.append('started_at', now.toISOString());
                    } else if (settings.timeRange === 'year') {
                        now.setFullYear(now.getFullYear() - 1);
                        params.append('started_at', now.toISOString());
                    }

                    const response = await fetch(`https://api.twitch.tv/helix/clips?${params.toString()}`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });
                    const data = await response.json();
                    let clipsPool = data.data || [];

                    // Apply filters
                    if (settings.includedIds.length > 0) {
                        // Only play clips in the inclusion list
                        clipsPool = clipsPool.filter(c => settings.includedIds.includes(c.id));
                        
                        // If no included clips found in the current date range, fetch them specifically
                        if (clipsPool.length === 0) {
                            const specificRes = await fetch(`https://api.twitch.tv/helix/clips?id=${settings.includedIds.join('&id=')}`, {
                                headers: {
                                    'Client-ID': CONFIG.clientId,
                                    'Authorization': `Bearer ${CONFIG.accessToken}`
                                }
                            });
                            const specificData = await specificRes.json();
                            clipsPool = specificData.data || [];
                        }
                    }
                    
                    // Filter out banned clips
                    if (settings.excludedIds.length > 0) {
                        clipsPool = clipsPool.filter(c => !settings.excludedIds.includes(c.id));
                    }

                    if (clipsPool.length > 0) {
                        const nextClip = settings.shuffle 
                            ? clipsPool[Math.floor(Math.random() * clipsPool.length)]
                            : clipsPool[0];
                        
                        setClip(nextClip);
                        fetchGameArt(nextClip.game_id);
                    }
                } catch (err) {
                    console.error("Rotation failed", err);
                } finally {
                    setLoading(false);
                }
            }, [settings]);

            // Load on startup immediately
            useEffect(() => { 
                pickRandomClip(); 
            }, []);

            // Handle the transition timer
            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => { 
                    pickRandomClip(); 
                }, settings.duration * 1000);
                return () => clearInterval(timerRef.current);
            }, [settings.duration, pickRandomClip]);

            const getEmbedUrl = (c) => {
                if (!c) return '';
                const host = window.location.hostname;
                // Important: autoplay=true and parent domain for embedding
                return `${c.embed_url}&parent=${host}&parent=rydenbelmont-maker.github.io&autoplay=true&muted=false`;
            };

            const toggleId = (id, listKey) => {
                setSettings(prev => {
                    const newList = prev[listKey].includes(id)
                        ? prev[listKey].filter(i => i !== id)
                        : [...prev[listKey], id];
                    return { ...prev, [listKey]: newList };
                });
            };

            useEffect(() => {
                if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            });

            // Open menu and build search database
            const openMenu = () => {
                setShowMenu(true);
                if (fullClipCache.length === 0) buildSearchDatabase();
            };

            return (
                <div className="relative w-full h-full group overflow-hidden bg-black">
                    {/* Settings Trigger - Hidden by default, visible on hover */}
                    <div className="absolute top-0 left-0 w-32 h-32 z-[100] settings-trigger flex items-start p-6">
                        <button onClick={openMenu} className="bg-black/60 hover:bg-black/90 p-3 rounded-2xl border border-white/10 backdrop-blur-md transition-all text-white/40 hover:text-white shadow-2xl">
                            <i data-lucide="settings" className="w-6 h-6"></i>
                        </button>
                    </div>

                    {/* Pro Control Menu */}
                    {showMenu && (
                        <div className="absolute inset-0 z-[200] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-4">
                            <div className="w-full max-w-4xl max-h-[90vh] bg-[#0c0c0e] border border-white/10 rounded-[3rem] p-8 md:p-12 space-y-8 shadow-2xl relative overflow-hidden flex flex-col">
                                <button onClick={() => setShowMenu(false)} className="absolute top-10 right-10 text-zinc-500 hover:text-white transition-colors">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>

                                <div className="space-y-1">
                                    <h3 className="text-3xl font-black tracking-tighter text-white uppercase italic">Ryden Belmont Controller</h3>
                                    <p className="text-[10px] text-zinc-600 font-black tracking-[0.4em] uppercase">Archive Filtering System</p>
                                </div>

                                <div className="grid md:grid-cols-2 gap-10 overflow-hidden">
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Clip Length (S)</label>
                                                <input type="number" value={settings.duration} onChange={(e) => setSettings({...settings, duration: Number(e.target.value)})} className="w-full bg-black border border-white/5 rounded-2xl px-4 py-3 text-sm focus:ring-1 focus:ring-purple-500 outline-none transition-all"/>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Time Window</label>
                                                <select value={settings.timeRange} onChange={(e) => setSettings({...settings, timeRange: e.target.value})} className="w-full bg-black border border-white/5 rounded-2xl px-4 py-3 text-xs focus:ring-1 focus:ring-purple-500 outline-none appearance-none cursor-pointer">
                                                    <option value="all">Featured / All Time</option>
                                                    <option value="7d">Last 7 Days</option>
                                                    <option value="30d">Last 30 Days</option>
                                                    <option value="year">This Year</option>
                                                </select>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest flex justify-between items-center">
                                                Search Database 
                                                {searching && <span className="animate-pulse text-purple-500">Indexing...</span>}
                                            </label>
                                            <div className="relative">
                                                <input 
                                                    type="text" 
                                                    placeholder="Search to Pin or Ban specific clips..." 
                                                    value={searchQuery}
                                                    onChange={(e) => setSearchQuery(e.target.value)}
                                                    className="w-full bg-black border border-white/10 rounded-2xl pl-12 pr-4 py-4 text-xs focus:ring-1 focus:ring-purple-500 outline-none transition-all"
                                                />
                                                <i data-lucide="search" className="absolute left-4 top-4 text-zinc-600 w-4 h-4"></i>
                                            </div>
                                            
                                            <div className="h-64 overflow-y-auto custom-scrollbar space-y-2 pr-2">
                                                {searching ? (
                                                    <div className="text-center py-20"><Spinner className="mx-auto" /></div>
                                                ) : fullClipCache.filter(c => c.title.toLowerCase().includes(searchQuery.toLowerCase())).length > 0 ? (
                                                    fullClipCache.filter(c => c.title.toLowerCase().includes(searchQuery.toLowerCase())).map(c => (
                                                        <div key={c.id} className="bg-black/40 p-2.5 rounded-2xl border border-white/5 flex items-center gap-4 hover:border-white/10 transition-all">
                                                            <img src={c.thumbnail_url} className="w-16 h-10 rounded-xl object-cover shadow-lg" />
                                                            <div className="flex-1 overflow-hidden">
                                                                <p className="text-[10px] font-bold truncate text-white">{c.title}</p>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <button 
                                                                    title="Pin this clip"
                                                                    onClick={() => toggleId(c.id, 'includedIds')}
                                                                    className={`p-2 rounded-xl border transition-all ${settings.includedIds.includes(c.id) ? 'bg-green-500 border-green-400 text-white' : 'border-white/10 text-zinc-600 hover:text-green-500'}`}
                                                                ><i data-lucide="check" className="w-3.5 h-3.5"></i></button>
                                                                <button 
                                                                    title="Ban this clip"
                                                                    onClick={() => toggleId(c.id, 'excludedIds')}
                                                                    className={`p-2 rounded-xl border transition-all ${settings.excludedIds.includes(c.id) ? 'bg-red-500 border-red-400 text-white' : 'border-white/10 text-zinc-600 hover:text-red-500'}`}
                                                                ><i data-lucide="slash" className="w-3.5 h-3.5"></i></button>
                                                            </div>
                                                        </div>
                                                    ))
                                                ) : (
                                                    <div className="text-center py-10 text-[10px] text-zinc-700 uppercase font-bold tracking-widest italic">
                                                        {searchQuery ? "No results found" : "Type to filter your clips..."}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-black/20 rounded-[2.5rem] border border-white/5 p-8 flex flex-col">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-6 italic">Configuration Sync</label>
                                        <div className="flex-1 space-y-5 text-[11px]">
                                            <div className="p-5 bg-purple-600/5 border border-purple-500/20 rounded-3xl">
                                                <p className="text-zinc-500 mb-1 uppercase text-[8px] font-black tracking-widest">Playback Rotation</p>
                                                <p className="text-white font-bold tracking-tight">{settings.duration}s cycles</p>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 text-center">
                                                <div className={`p-5 rounded-3xl border ${settings.includedIds.length > 0 ? 'bg-green-500/5 border-green-500/20' : 'bg-white/5 border-white/5 opacity-40'}`}>
                                                    <p className="text-zinc-500 mb-1 uppercase text-[8px] font-black tracking-widest">Pinned</p>
                                                    <p className="text-white font-bold">{settings.includedIds.length}</p>
                                                </div>
                                                <div className={`p-5 rounded-3xl border ${settings.excludedIds.length > 0 ? 'bg-red-500/5 border-red-500/20' : 'bg-white/5 border-white/5 opacity-40'}`}>
                                                    <p className="text-zinc-500 mb-1 uppercase text-[8px] font-black tracking-widest">Banned</p>
                                                    <p className="text-white font-bold">{settings.excludedIds.length}</p>
                                                </div>
                                            </div>
                                        </div>
                                        <button onClick={() => { pickRandomClip(); setShowMenu(false); }} className="w-full bg-white text-black py-5 mt-8 rounded-3xl font-black text-xs uppercase tracking-[0.3em] hover:bg-purple-600 hover:text-white transition-all shadow-2xl active:scale-95">
                                            Apply Changes
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Clip Iframe - Key reset forces autoplay on swap */}
                    {clip ? (
                        <iframe 
                            key={clip.id} 
                            src={getEmbedUrl(clip)} 
                            allowFullScreen 
                            allow="autoplay; fullscreen"
                            className="absolute inset-0 w-full h-full"
                        ></iframe>
                    ) : (
                        <div className="w-full h-full flex items-center justify-center bg-black"><Spinner className="w-12 h-12" /></div>
                    )}

                    {/* Metadata Overlay */}
                    {clip && !showMenu && (
                        <div className="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black via-black/40 to-transparent pointer-events-none flex items-end p-8 md:p-16">
                            <div className="max-w-5xl animate-in fade-in slide-in-from-bottom-6 duration-1000">
                                <div className="flex items-center gap-4 mb-4">
                                    <span className="bg-purple-600 text-[10px] font-black px-3 py-1.5 rounded-md uppercase tracking-widest shadow-xl shadow-purple-500/30 italic">Featured Highlight</span>
                                    <span className="text-[10px] text-zinc-500 font-black uppercase tracking-[0.3em]">{clip.creator_name}</span>
                                </div>
                                <h2 className="text-4xl md:text-7xl font-black text-white tracking-tighter leading-[0.85] drop-shadow-[0_10px_10px_rgba(0,0,0,0.8)] uppercase italic">{clip.title}</h2>
                                <div className="mt-6 flex items-center gap-8 text-[11px] md:text-sm font-black uppercase tracking-widest text-zinc-500">
                                    <span className="text-purple-500">{clip.view_count.toLocaleString()} Views</span>
                                    <span className="text-zinc-800">/</span>
                                    <span>{new Date(clip.created_at).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Game Box Art */}
                    {gameArt && !showMenu && (
                        <div className="absolute bottom-10 right-10 md:bottom-20 md:right-20 w-28 md:w-44 game-art-float pointer-events-none">
                            <div className="p-2 bg-white/10 backdrop-blur-3xl rounded-[2rem] shadow-2xl ring-1 ring-white/20 overflow-hidden">
                                <img src={gameArt} alt="Game Box Art" className="w-full h-auto rounded-[1.5rem] shadow-lg opacity-90" />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
