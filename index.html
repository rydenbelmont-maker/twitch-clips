<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - MMPR Stream Overlay</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Teko:wght@300;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --ranger-red: #e21b22;
            --ranger-gold: #ffd700;
            --ranger-silver: #c0c0c0;
            --bg-dark: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark) !important; 
            color: white;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Invisible Admin Trigger (Top Left) */
        #admin-trigger {
            position: fixed;
            top: 0;
            left: 0;
            width: 60px;
            height: 60px;
            z-index: 9999;
            cursor: crosshair;
            opacity: 0;
        }

        /* Admin Control Panel */
        #admin-panel {
            position: fixed;
            top: 70px;
            left: 20px;
            background: rgba(15, 15, 15, 0.98);
            border: 2px solid var(--ranger-gold);
            padding: 1.5rem;
            z-index: 9998;
            display: none;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            border-radius: 1rem;
            min-width: 220px;
        }

        .admin-btn {
            background: #1a1a1a;
            border: 1px solid var(--ranger-silver);
            color: white;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-weight: 700;
        }

        .admin-btn:hover {
            background: var(--ranger-red);
            border-color: white;
            box-shadow: 0 0 10px var(--ranger-red);
        }

        /* The Grid Background */
        .the-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: 
                linear-gradient(rgba(226, 27, 34, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(226, 27, 34, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            perspective: 1000px;
            transform: rotateX(45deg) translateY(-20%);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        #lightning-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Main Morpher Container */
        .morpher-card {
            background: linear-gradient(135deg, #111 0%, #000 100%);
            border: 4px solid var(--ranger-silver);
            border-radius: 1.5rem;
            width: 950px;
            min-height: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 50px rgba(226, 27, 34, 0.4);
            position: relative;
            transform: skew(-1deg);
            padding: 2.5rem;
            transition: all 0.5s ease-in-out;
        }

        /* Content Areas */
        .content-wrapper {
            width: 100%;
            height: 480px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 0.5rem;
        }

        .title-view {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            z-index: 10;
            background: #000; 
        }

        .widget-view {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: opacity 0.8s ease-in-out;
            z-index: 5;
            background: #000;
            border: 2px solid var(--ranger-gold);
            box-shadow: 0 0 25px var(--ranger-gold);
            overflow: hidden;
        }

        body.is-widget-mode .title-view { opacity: 0; transform: scale(0.95); pointer-events: none; }
        body:not(.is-widget-mode) .widget-view { opacity: 0; pointer-events: none; }

        .timer-display {
            font-size: 5rem;
            color: white;
            margin-top: 2rem;
            background: rgba(226, 27, 34, 0.25);
            padding: 0.4rem 4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 3px;
            z-index: 20;
            border-radius: 0.5rem;
        }

        .header-tag {
            font-size: 0.9rem;
            color: var(--ranger-gold);
            letter-spacing: 0.6rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            font-weight: 700;
        }

        .social-bar {
            position: fixed;
            bottom: 2rem;
            width: 90%;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 1.2rem;
            font-size: 0.8rem;
            color: var(--ranger-silver);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .accent-red { color: var(--ranger-red); font-weight: 900; }
        
        .large-bolt {
            fill: var(--ranger-gold);
            width: 120px;
            filter: drop-shadow(0 0 20px var(--ranger-gold));
            animation: flicker 0.2s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Clip UI Specifics */
        #clip-frame { width: 100%; height: 100%; border: none; }
        
        #settings-trigger-clip {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .widget-view:hover #settings-trigger-clip { opacity: 1; }

        #settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            backdrop-filter: blur(10px);
            color: white;
            overflow-y: auto;
            padding: 2rem;
            font-family: 'Inter', sans-serif;
        }
        #settings-modal.active { display: flex; flex-direction: column; }
    </style>
</head>
<body class="is-widget-mode">

    <!-- Invisible Admin Trigger -->
    <div id="admin-trigger" title="Master Control"></div>
    
    <div id="admin-panel">
        <h3 class="text-[0.65rem] text-yellow-400 mb-2 font-black italic tracking-widest border-b border-yellow-400/30 pb-1 uppercase">Zordon's Override</h3>
        <div class="flex gap-2">
            <input id="admin-min" type="number" value="5" class="bg-black border border-gray-600 text-white w-14 p-2 text-xs focus:border-red-500 outline-none" placeholder="Min">
            <input id="admin-sec" type="number" value="0" class="bg-black border border-gray-600 text-white w-14 p-2 text-xs focus:border-red-500 outline-none" placeholder="Sec">
            <button class="admin-btn" onclick="setTimer()">SET</button>
        </div>
        <div class="flex flex-col gap-2">
            <button id="pause-btn" class="admin-btn" onclick="togglePause()">PAUSE GRID</button>
            <button class="admin-btn" onclick="toggleDisplay()">MANUAL SWAP</button>
            <button class="admin-btn" onclick="toggleAutoRotate()">ROTATION: <span id="auto-status" class="text-green-400">ON</span></button>
        </div>
    </div>

    <div class="the-grid"></div>
    <canvas id="lightning-canvas"></canvas>

    <div class="morpher-card">
        <div id="mode-header" class="header-tag">Initializing...</div>

        <div class="content-wrapper">
            <!-- Title View -->
            <div id="view-title" class="title-view">
                <svg class="large-bolt" viewBox="0 0 32 32">
                    <path d="M18 2 L6 16 L14 16 L10 30 L26 12 L18 12 Z"></path>
                </svg>
            </div>

            <!-- Clip Widget View -->
            <div id="view-widget" class="widget-view">
                <iframe id="clip-frame" allowfullscreen="true" scrolling="no" allow="autoplay; encrypted-media"></iframe>
                
                <!-- Game Overlay (Bottom Right) -->
                <div id="game-overlay" class="absolute bottom-4 right-4 z-10 opacity-0 transition-opacity duration-500 pointer-events-none flex items-center gap-3 bg-black/80 backdrop-blur-md border border-white/10 p-2 pr-4 rounded-xl">
                    <img id="overlay-game-art" src="" alt="Game Art" class="w-10 h-14 object-cover rounded shadow-md hidden">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-yellow-400 font-bold uppercase tracking-wider">Now Reviewing</span>
                        <span id="overlay-game-name" class="text-white font-bold text-sm leading-tight"></span>
                    </div>
                </div>

                <button id="settings-trigger-clip" class="bg-indigo-600 text-white p-2 rounded-full shadow-lg" onclick="openSettings()">
                    <i class="ph ph-gear text-xl"></i>
                </button>
            </div>
        </div>
        
        <div id="timer" class="timer-display">05:00</div>
        
        <div class="mt-4 text-[0.7rem] tracking-widest opacity-60 uppercase font-black">
            [ Power Grid Status: Fully Synchronized ]
        </div>
    </div>

    <div class="social-bar">
        <div><span class="accent-red">[BROADCAST]</span> RYDEN BELMONT // KICK & BLUE SKY</div>
        <div>RYDENTTV // TWITCH - TIKTOK - X <span class="accent-red">[LIVE_SIG]</span></div>
    </div>

    <!-- Clip Settings Modal -->
    <div id="settings-modal">
        <div class="max-w-6xl mx-auto w-full">
            <div class="flex justify-between items-center mb-6 border-b border-white/10 pb-4">
                <div>
                    <h1 class="text-2xl font-bold flex items-center gap-3"><i class="ph-fill ph-twitch-logo text-purple-500"></i> Archive Management</h1>
                    <p id="indexing-status" class="text-slate-400 text-sm mt-1">Ready</p>
                </div>
                <button onclick="closeSettings()" class="bg-red-600 px-6 py-2 rounded-lg font-bold">CLOSE & SAVE</button>
            </div>
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-white/5 p-4 rounded border border-white/10 text-center"><div class="text-xs opacity-50">INDEXED</div><div id="stat-total" class="text-xl font-bold">0</div></div>
                <div class="bg-white/5 p-4 rounded border border-white/10 text-center"><div class="text-xs opacity-50">PINNED</div><div id="stat-pinned" class="text-xl font-bold text-yellow-400">0</div></div>
                <div class="bg-white/5 p-4 rounded border border-white/10 text-center"><div class="text-xs opacity-50">BANNED</div><div id="stat-banned" class="text-xl font-bold text-red-500">0</div></div>
            </div>
            <div id="clips-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <script>
        /** --- CLIP WIDGET ENGINE --- **/
        const CLIP_CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t',
            storageKey: 'ryden_widget_v10_settings',
            baseParents: ['localhost', '127.0.0.1', 'rydenbelmont-maker.github.io', 'obs.twitch.tv']
        };

        let clipState = { clips: [], playbackQueue: [], currentIndex: -1, rotationTimer: null, hasDeepIndexed: false };
        let gameCache = {};
        let clipSettings = { pinned: [], banned: [] };

        function loadClipSettings() {
            const saved = localStorage.getItem(CLIP_CONFIG.storageKey);
            if (saved) { try { clipSettings = { ...clipSettings, ...JSON.parse(saved) }; } catch(e) {} }
        }

        async function fetchClips(limit = 100, cursor = null) {
            let url = `https://api.twitch.tv/helix/clips?broadcaster_id=${CLIP_CONFIG.broadcasterId}&first=${limit}`;
            if (cursor) url += `&after=${cursor}`;
            const res = await fetch(url, { headers: { 'Client-ID': CLIP_CONFIG.clientId, 'Authorization': `Bearer ${CLIP_CONFIG.accessToken}` } });
            const data = await res.json();
            return { data: data.data || [], cursor: data.pagination ? data.pagination.cursor : null };
        }

        async function getGameInfo(gameId) {
            if (!gameId || gameCache[gameId]) return gameCache[gameId];
            const res = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, { headers: { 'Client-ID': CLIP_CONFIG.clientId, 'Authorization': `Bearer ${CLIP_CONFIG.accessToken}` } });
            const data = await res.json();
            if (data.data?.length) { gameCache[gameId] = data.data[0]; return data.data[0]; }
            return null;
        }

        function buildPlaybackQueue() {
            const validIds = clipState.clips.map(c => c.id);
            clipSettings.pinned = clipSettings.pinned.filter(id => validIds.includes(id));
            if (clipSettings.pinned.length > 0) {
                clipState.playbackQueue = clipState.clips.filter(c => clipSettings.pinned.includes(c.id));
            } else {
                clipState.playbackQueue = clipState.clips.filter(c => !clipSettings.banned.includes(c.id));
            }
            clipState.playbackQueue.sort(() => Math.random() - 0.5);
            clipState.currentIndex = -1;
        }

        function playNextClip() {
            if (!clipState.playbackQueue.length) return;
            clipState.currentIndex = (clipState.currentIndex + 1) % clipState.playbackQueue.length;
            const clip = clipState.playbackQueue[clipState.currentIndex];
            const parents = [...CLIP_CONFIG.baseParents, window.location.hostname].filter(Boolean);
            const parentString = parents.map(p => `&parent=${p}`).join('');
            document.getElementById('clip-frame').src = `https://clips.twitch.tv/embed?autoplay=true&clip=${clip.id}&muted=false${parentString}`;

            const overlay = document.getElementById('game-overlay');
            overlay.classList.add('opacity-0');
            if (clip.game_id) {
                getGameInfo(clip.game_id).then(game => {
                    if (game) {
                        document.getElementById('overlay-game-name').innerText = game.name;
                        const art = document.getElementById('overlay-game-art');
                        art.src = game.box_art_url.replace('{width}', '60').replace('{height}', '80');
                        art.classList.remove('hidden');
                        setTimeout(() => overlay.classList.remove('opacity-0'), 800);
                    }
                });
            }
            clearTimeout(clipState.rotationTimer);
            clipState.rotationTimer = setTimeout(playNextClip, (clip.duration * 1000) + 2000);
        }

        async function runDeepIndexing() {
            if (clipState.hasDeepIndexed) return;
            document.getElementById('indexing-status').innerText = 'Indexing Archive...';
            let all = []; let cur = null;
            for(let i=0; i<5; i++) {
                const res = await fetchClips(100, cur);
                if (!res.data.length) break;
                all.push(...res.data);
                cur = res.cursor;
                if (!cur) break;
            }
            clipState.clips = all; clipState.hasDeepIndexed = true;
            document.getElementById('indexing-status').innerText = `Indexed ${all.length} clips.`;
            updateClipStats(); renderClipsGrid();
        }

        function openSettings() { document.getElementById('settings-modal').classList.add('active'); runDeepIndexing(); }
        function closeSettings() { 
            document.getElementById('settings-modal').classList.remove('active'); 
            localStorage.setItem(CLIP_CONFIG.storageKey, JSON.stringify(clipSettings));
            buildPlaybackQueue(); 
            playNextClip();
        }

        function togglePin(id) {
            clipSettings.pinned = clipSettings.pinned.includes(id) ? clipSettings.pinned.filter(x => x !== id) : [...clipSettings.pinned, id];
            clipSettings.banned = clipSettings.banned.filter(x => x !== id);
            updateClipStats(); renderClipsGrid();
        }

        function toggleBan(id) {
            clipSettings.banned = clipSettings.banned.includes(id) ? clipSettings.banned.filter(x => x !== id) : [...clipSettings.banned, id];
            clipSettings.pinned = clipSettings.pinned.filter(x => x !== id);
            updateClipStats(); renderClipsGrid();
        }

        function updateClipStats() {
            document.getElementById('stat-total').innerText = clipState.clips.length;
            document.getElementById('stat-pinned').innerText = clipSettings.pinned.length;
            document.getElementById('stat-banned').innerText = clipSettings.banned.length;
        }

        function renderClipsGrid() {
            const grid = document.getElementById('clips-grid'); grid.innerHTML = '';
            clipState.clips.forEach(c => {
                const pin = clipSettings.pinned.includes(c.id);
                const ban = clipSettings.banned.includes(c.id);
                const el = document.createElement('div');
                el.className = `bg-white/5 rounded overflow-hidden border ${pin?'border-yellow-400':ban?'border-red-600 opacity-40':'border-white/10'}`;
                el.innerHTML = `
                    <div class="relative"><img src="${c.thumbnail_url}" class="w-full h-24 object-cover">
                    <div class="absolute top-1 right-1 flex gap-1">
                        <button onclick="togglePin('${c.id}')" class="bg-black/60 p-1 rounded"><i class="ph${pin?'-fill text-yellow-400':''} ph-push-pin"></i></button>
                        <button onclick="toggleBan('${c.id}')" class="bg-black/60 p-1 rounded"><i class="ph${ban?'-fill text-red-500':''} ph-prohibit"></i></button>
                    </div></div>
                    <div class="p-2 text-[10px] truncate font-bold">${c.title}</div>
                `;
                grid.appendChild(el);
            });
        }

        /** --- OVERLAY SYSTEM LOGIC --- **/
        const body = document.body;
        const modeHeader = document.getElementById('mode-header');
        const adminPanel = document.getElementById('admin-panel');
        const adminTrigger = document.getElementById('admin-trigger');
        const timerElement = document.getElementById('timer');
        const pauseBtn = document.getElementById('pause-btn');
        const autoStatus = document.getElementById('auto-status');
        
        let isWidgetMode = true;
        let timeLeft = 300;
        let isPaused = false;
        let autoRotate = true;
        let rotationInterval;

        adminTrigger.addEventListener('click', () => {
            adminPanel.style.display = adminPanel.style.display === 'flex' ? 'none' : 'flex';
        });

        function toggleDisplay() {
            isWidgetMode = !isWidgetMode;
            if(isWidgetMode) {
                body.classList.add('is-widget-mode');
                modeHeader.textContent = "Reviewing Tactical Highlights";
                modeHeader.style.color = "#ffffff";
            } else {
                body.classList.remove('is-widget-mode');
                modeHeader.textContent = "It's Morphin Time";
                modeHeader.style.color = "#ffd700";
            }
        }

        function startAutoRotation() {
            if (rotationInterval) clearInterval(rotationInterval);
            rotationInterval = setInterval(() => { if (autoRotate) toggleDisplay(); }, 30000);
        }

        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            autoStatus.textContent = autoRotate ? "ON" : "OFF";
            autoStatus.className = autoRotate ? "text-green-400" : "text-red-500";
        }

        function setTimer() {
            const m = parseInt(document.getElementById('admin-min').value) || 0;
            const s = parseInt(document.getElementById('admin-sec').value) || 0;
            timeLeft = (m * 60) + s;
            updateTimerDisplay();
        }

        function togglePause() {
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? "RESUME GRID" : "PAUSE GRID";
            pauseBtn.style.color = isPaused ? "#ffd700" : "#fff";
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(Math.max(0, timeLeft) / 60);
            const seconds = Math.max(0, timeLeft) % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        setInterval(() => {
            if (!isPaused && timeLeft > 0) { timeLeft--; updateTimerDisplay(); }
            else if (timeLeft <= 0) { timerElement.textContent = "LIVE"; timerElement.style.color = "#ffd700"; }
        }, 1000);

        // Background FX
        const canvas = document.getElementById('lightning-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function drawLightning() {
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.shadowBlur = 20; ctx.shadowColor = '#ffd700';
            let curX = Math.random() * canvas.width; let curY = 0;
            ctx.beginPath(); ctx.moveTo(curX, curY);
            while (curY < canvas.height) { curX += (Math.random() - 0.5) * 80; curY += Math.random() * 50; ctx.lineTo(curX, curY); }
            ctx.stroke(); setTimeout(() => ctx.clearRect(0, 0, canvas.width, canvas.height), 120);
        }

        function animate() { if (Math.random() > 0.988) drawLightning(); requestAnimationFrame(animate); }

        // Start Everything
        loadClipSettings();
        fetchClips(100).then(res => {
            clipState.clips = res.data;
            buildPlaybackQueue();
            playNextClip();
            modeHeader.textContent = "Reviewing Tactical Highlights";
        });
        startAutoRotation();
        animate();
    </script>
</body>
</html>
