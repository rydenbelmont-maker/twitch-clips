<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Minimal Clip Viewer</title>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html { 
            margin: 0;
            padding: 0;
            background-color: #000; 
            color: #fff; 
            overflow: hidden; 
            width: 100%;
            height: 100%;
        }
        #root { width: 100%; height: 100%; }
        iframe { border: none; width: 100%; height: 100%; }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        .game-art-float { animation: float 4s ease-in-out infinite; }
        
        /* Hide scrollbars globally */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t'
        };

        const App = () => {
            const [clip, setClip] = useState(null);
            const [gameArt, setGameArt] = useState(null);
            const [loading, setLoading] = useState(true);

            const fetchData = useCallback(async () => {
                try {
                    // Fetch top clip
                    const clipsRes = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${CONFIG.broadcasterId}&first=1`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });
                    const clipsData = await clipsRes.json();
                    
                    if (clipsData.data && clipsData.data.length > 0) {
                        const featuredClip = clipsData.data[0];
                        setClip(featuredClip);
                        fetchGameArt(featuredClip.game_id);
                    }
                } catch (err) {
                    console.error("Fetch failed", err);
                } finally {
                    setLoading(false);
                }
            }, []);

            const fetchGameArt = async (gameId) => {
                if (!gameId) return;
                try {
                    const gameRes = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });
                    const gameData = await gameRes.json();
                    if (gameData.data.length > 0) {
                        const url = gameData.data[0].box_art_url.replace('{width}', '300').replace('{height}', '400');
                        setGameArt(url);
                    }
                } catch (err) {
                    console.error("Game art failed", err);
                }
            };

            useEffect(() => {
                fetchData();
            }, [fetchData]);

            const getEmbedUrl = (c) => {
                if (!c) return '';
                const host = window.location.hostname;
                // Add parents for GitHub and local preview
                return `${c.embed_url}&parent=${host}&parent=rydenbelmont-maker.github.io&autoplay=true&muted=false`;
            };

            if (loading) {
                return (
                    <div className="w-full h-full flex items-center justify-center bg-black">
                        <div className="w-8 h-8 border-4 border-purple-600 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            if (!clip) {
                return (
                    <div className="w-full h-full flex items-center justify-center bg-black text-zinc-500 font-bold uppercase tracking-widest text-xs">
                        No Broadcast Clips Found
                    </div>
                );
            }

            return (
                <div className="relative w-full h-full group overflow-hidden bg-black">
                    {/* The Clip Player */}
                    <iframe 
                        src={getEmbedUrl(clip)}
                        allowFullScreen
                        className="absolute inset-0 w-full h-full"
                    ></iframe>

                    {/* Bottom Overlay: Title & Info */}
                    <div className="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-black/90 via-black/40 to-transparent pointer-events-none flex items-end p-6 md:p-10">
                        <div className="max-w-4xl animate-in fade-in slide-in-from-bottom-4 duration-700">
                            <div className="flex items-center gap-3 mb-2">
                                <span className="bg-purple-600 text-[10px] font-black px-2 py-0.5 rounded uppercase tracking-tighter">Featured Clip</span>
                                <span className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">
                                    {clip.creator_name}
                                </span>
                            </div>
                            <h2 className="text-2xl md:text-5xl font-black text-white tracking-tighter leading-[0.95] drop-shadow-2xl">
                                {clip.title}
                            </h2>
                            <div className="mt-3 flex items-center gap-4 text-[10px] md:text-xs font-bold uppercase tracking-widest text-zinc-400">
                                <span>{clip.view_count.toLocaleString()} Views</span>
                                <span className="w-1 h-1 rounded-full bg-zinc-700"></span>
                                <span>{new Date(clip.created_at).toLocaleDateString()}</span>
                            </div>
                        </div>
                    </div>

                    {/* Game Art Overlay - Bottom Right */}
                    {gameArt && (
                        <div className="absolute bottom-6 right-6 md:bottom-10 md:right-10 w-20 md:w-32 game-art-float pointer-events-none">
                            <div className="p-1 bg-white/10 backdrop-blur-md rounded-xl shadow-2xl ring-1 ring-white/20 overflow-hidden">
                                <img 
                                    src={gameArt} 
                                    alt="Game Box Art" 
                                    className="w-full h-auto rounded-lg shadow-lg opacity-90"
                                />
                            </div>
                        </div>
                    )}
                    
                    {/* Minimal Refresh Trigger (Top Right, subtle) */}
                    <button 
                        onClick={() => window.location.reload()}
                        className="absolute top-6 right-6 p-2 rounded-full bg-black/20 hover:bg-black/60 text-white/20 hover:text-white transition-all opacity-0 group-hover:opacity-100 backdrop-blur-sm border border-white/5"
                    >
                        <i data-lucide="refresh-cw" className="w-4 h-4"></i>
                    </button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Lucide icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
