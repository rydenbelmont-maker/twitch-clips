<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Clip Widget</title>
    
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src * data:; frame-src https://clips.twitch.tv https://player.twitch.tv;">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; background-color: transparent; color: #fff; 
            overflow: hidden; width: 100%; height: 100%; font-family: 'Inter', sans-serif;
        }
        #root { width: 100%; height: 100%; }
        
      .widget-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        iframe { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;
            z-index: 1;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }
      .game-art-float { animation: float 5s ease-in-out infinite; }
        
      .settings-area {
            position: absolute; top: 0; left: 0; width: 80px; height: 80px;
            z-index: 100; opacity: 0; transition: opacity 0.3s ease;
        }
      .settings-area:hover { opacity: 1; }
        
      .overlay-mask {
            position: absolute; 
            bottom: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            pointer-events: none; z-index: 10;
        }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef, useMemo } = React;

        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t'
        };

        const App = () => {
            const [clip, setClip] = useState(null);
            const [gameArt, setGameArt] = useState(null);
            const [loading, setLoading] = useState(true);
            const = useState(false);
            const [isMuted, setIsMuted] = useState(true);
            const [clipArchive, setClipArchive] = useState();
            const [indexing, setIndexing] = useState(false);
            const = useState('');

            const = useState(() => {
                const saved = localStorage.getItem('ryden_widget_settings');
                return saved? JSON.parse(saved) : {
                    duration: 60,
                    range: 100,
                    timeRange: 'all',
                    excludedIds:,
                    includedIds:,
                    shuffle: true
                };
            });

            const timerRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('ryden_widget_settings', JSON.stringify(settings));
            }, [settings]);

            const fetchGameArt = async (gameId) => {
                if (!gameId) return;
                try {
                    const res = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, {
                        headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                    });
                    const data = await res.json();
                    if (data.data?.length > 0) {
                        setGameArt(data.data.box_art_url.replace('{width}', '300').replace('{height}', '400'));
                    }
                } catch (e) { console.error(e); }
            };

            const buildDatabase = async () => {
                setIndexing(true);
                try {
                    let collected =;
                    let cursor = '';
                    for (let i = 0; i < 10; i++) {
                        const res = await fetch(`https://api.twitch.tv/helix/clips?broadcaster_id=${CONFIG.broadcasterId}&first=100${cursor? `&after=${cursor}` : ''}`, {
                            headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                        });
                        const data = await res.json();
                        if (data.data) collected = [...collected,...data.data];
                        cursor = data.pagination?.cursor;
                        if (!cursor) break;
                    }
                    setClipArchive(collected);
                } catch (e) { console.error(e); }
                finally { setIndexing(false); }
            };

            const rotateClip = useCallback(async () => {
                setLoading(true);
                try {
                    const params = new URLSearchParams({ broadcaster_id: CONFIG.broadcasterId, first: settings.range });
                    const now = new Date();
                    if (settings.timeRange === '7d') now.setDate(now.getDate() - 7);
                    else if (settings.timeRange === '30d') now.setMonth(now.getMonth() - 1);
                    else if (settings.timeRange === 'year') now.setFullYear(now.getFullYear() - 1);
                    if (settings.timeRange!== 'all') params.append('started_at', now.toISOString());

                    const res = await fetch(`https://api.twitch.tv/helix/clips?${params.toString()}`, {
                        headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                    });
                    const data = await res.json();
                    let pool = data.data ||;

                    if (settings.includedIds.length > 0) {
                        pool = pool.filter(c => settings.includedIds.includes(c.id));
                        if (pool.length === 0) {
                            const specRes = await fetch(`https://api.twitch.tv/helix/clips?id=${settings.includedIds.join('&id=')}`, {
                                headers: { 'Client-ID': CONFIG.clientId, 'Authorization': `Bearer ${CONFIG.accessToken}` }
                            });
                            const specData = await specRes.json();
                            pool = specData.data ||;
                        }
                    }
                    if (settings.excludedIds.length > 0) pool = pool.filter(c =>!settings.excludedIds.includes(c.id));

                    if (pool.length > 0) {
                        const selection = settings.shuffle? pool[Math.floor(Math.random() * pool.length)] : pool;
                        setClip(selection);
                        fetchGameArt(selection.game_id);
                    }
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            }, [settings]);

            useEffect(() => {
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(rotateClip, settings.duration * 1000);
                return () => clearInterval(timerRef.current);
            }, [settings.duration, rotateClip]);

            useEffect(() => { rotateClip(); },);

            const getEmbedUrl = (c) => {
                if (!c) return '';
                const host = window.location.hostname |

| 'localhost';
                return `https://clips.twitch.tv/embed?clip=${c.id}&autoplay=true&muted=${isMuted}&parent=${host}&parent=rydenbelmont-maker.github.io&parent=localhost&parent=obs.twitch.tv`;
            };

            const toggleFilter = (id, key) => {
                setSettings(prev => ({
                  ...prev,
                    [key]: prev[key].includes(id)? prev[key].filter(x => x!== id) : [...prev[key], id]
                }));
            };

            const filteredArchive = useMemo(() => {
                if (!searchQuery) return;
                return clipArchive.filter(c => c.title.toLowerCase().includes(searchQuery.toLowerCase()));
            }, [searchQuery, clipArchive]);

            const handlePageClick = () => {
                if (isMuted) setIsMuted(false);
            };

            useEffect(() => { if (typeof lucide!== 'undefined') lucide.createIcons(); });

            return (
                <div className="relative w-full h-full bg-black group overflow-hidden" onClick={handlePageClick}>
                    <div className="settings-area p-4">
                        <button 
                            onClick={(e) => { e.stopPropagation(); setShowMenu(true); if(clipArchive.length === 0) buildDatabase(); }}
                            className="bg-black/60 hover:bg-purple-600 p-3 rounded-xl border border-white/10 text-white/40 hover:text-white transition-all shadow-2xl"
                        >
                            <i data-lucide="settings" className="w-5 h-5"></i>
                        </button>
                    </div>

                    {isMuted && clip && (
                        <div className="absolute top-4 right-4 z- animate-pulse">
                            <div className="bg-purple-600/90 text-white px-3 py-1.5 rounded-full flex items-center gap-2 text-[8px] font-black uppercase tracking-widest backdrop-blur-md">
                                <i data-lucide="volume-x" className="w-3 h-3"></i>
                                Click to Unmute
                            </div>
                        </div>
                    )}

                    {showMenu && (
                        <div className="absolute inset-0 z- bg-black/95 backdrop-blur-3xl flex items-center justify-center p-4" onClick={() => setShowMenu(false)}>
                            <div className="w-full max-w-4xl max-h-[90vh] bg-[#0c0c0e] border border-white/10 rounded-[2.5rem] p-8 space-y-8 shadow-2xl relative flex flex-col" onClick={e => e.stopPropagation()}>
                                <button onClick={() => setShowMenu(false)} className="absolute top-8 right-8 text-zinc-600 hover:text-white transition-colors">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                                <div className="space-y-1">
                                    <h3 className="text-2xl font-black text-white uppercase italic">Widget Settings</h3>
                                    <p className="text-[8px] text-zinc-600 font-black tracking-widest uppercase">Stream Overlay v7.0 // Github Pages Optimized</p>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8 overflow-hidden flex-1">
                                    <div className="space-y-6 overflow-y-auto pr-4 custom-scrollbar">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black text-zinc-500 uppercase tracking-widest">Speed (S)</label>
                                                <input type="number" value={settings.duration} onChange={(e) => setSettings({...settings, duration: Number(e.target.value)})} className="w-full bg-black border border-white/5 rounded-xl px-4 py-3 text-xs font-bold focus:ring-1 focus:ring-purple-600 outline-none transition-all"/>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-[9px] font-black text-zinc-500 uppercase tracking-widest">History</label>
                                                <select value={settings.timeRange} onChange={(e) => setSettings({...settings, timeRange: e.target.value})} className="w-full bg-black border border-white/5 rounded-xl px-4 py-3 text-[10px] font-bold focus:ring-1 focus:ring-purple-600 outline-none cursor-pointer appearance-none">
                                                    <option value="all">Featured</option>
                                                    <option value="7d">Last 7d</option>
                                                    <option value="30d">Last 30d</option>
                                                    <option value="year">Yearly</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-4">
                                            <label className="text-[9px] font-black text-zinc-500 uppercase tracking-widest">Search Database</label>
                                            <input type="text" placeholder="Pin or Ban specific clips..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-black border border-white/10 rounded-xl pl-10 pr-4 py-3 text-xs font-medium focus:ring-1 focus:ring-purple-600 outline-none" />
                                            <div className="space-y-2 h-64 overflow-y-auto custom-scrollbar pr-2">
                                                {filteredArchive.map(c => (
                                                    <div key={c.id} className="bg-white/5 p-2 rounded-xl border border-white/5 flex items-center gap-3 hover:bg-white/10 transition-all">
                                                        <img src={c.thumbnail_url} className="w-16 h-10 rounded-lg object-cover shadow-lg" />
                                                        <div className="flex-1 overflow-hidden"><p className="text-[10px] font-bold truncate text-white">{c.title}</p></div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => toggleFilter(c.id, 'includedIds')} className={`p-1.5 rounded-lg border transition-all ${settings.includedIds.includes(c.id)? 'bg-green-600 border-green-400 text-white' : 'border-white/10 text-zinc-700 hover:text-green-500'}`}><i data-lucide="check" className="w-3 h-3"></i></button>
                                                            <button onClick={() => toggleFilter(c.id, 'excludedIds')} className={`p-1.5 rounded-lg border transition-all ${settings.excludedIds.includes(c.id)? 'bg-red-600 border-red-400 text-white' : 'border-white/10 text-zinc-700 hover:text-red-500'}`}><i data-lucide="slash" className="w-3 h-3"></i></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-white/5 rounded-3xl border border-white/5 p-8 flex flex-col justify-between">
                                        <div className="space-y-6">
                                            <label className="text-[9px] font-black text-zinc-500 uppercase tracking-widest italic">Widget Payload</label>
                                            <div className="p-4 bg-purple-600/5 border border-purple-500/20 rounded-2xl">
                                                <p className="text-[8px] text-purple-400 mb-1 uppercase font-black tracking-widest">Origin</p>
                                                <p className="text-white font-mono text-[10px] font-bold truncate">{window.location.hostname |

| 'localhost'}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => { rotateClip(); setShowMenu(false); }} className="w-full bg-white text-black py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-purple-600 hover:text-white transition-all shadow-2xl">Deploy Widget</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="widget-container">
                        {clip? (
                            <iframe 
                                key={`${clip.id}-${isMuted}`} 
                                src={getEmbedUrl(clip)} 
                                allowFullScreen 
                                allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
                                style={{ minWidth: '400px', minHeight: '300px' }}
                                className="w-full h-full"
                            ></iframe>
                        ) : (
                            <div className="w-full h-full flex flex-col items-center justify-center bg-black gap-4 opacity-30">
                                <div className="w-8 h-8 border-2 border-purple-600 border-t-transparent rounded-full animate-spin"></div>
                                <span className="text-[8px] font-black uppercase tracking-[0.4em] italic">Initializing Overlay...</span>
                            </div>
                        )}
                    </div>

                    {clip &&!showMenu && (
                        <div className="absolute bottom-0 left-0 right-0 h-1/3 overlay-mask flex items-end p-4 md:p-8">
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-700">
                                <div className="flex flex-col gap-2">
                                    <div className="flex items-center gap-2">
                                        <div className="bg-purple-600 px-2 py-1 rounded shadow-lg shadow-purple-500/30">
                                            <span className="text-[7px] font-black uppercase tracking-widest italic text-white leading-none">Highlights</span>
                                        </div>
                                        <span className="text-[8px] text-zinc-500 font-black uppercase tracking-widest">{clip.creator_name}</span>
                                    </div>
                                    <div className="flex items-center gap-4 text-[8px] font-black uppercase tracking-widest text-zinc-600 italic">
                                        <div className="flex items-center gap-1.5">
                                            <i data-lucide="eye" className="w-3 h-3 text-purple-600"></i>
                                            <span className="text-zinc-200">{clip.view_count.toLocaleString()}</span>
                                        </div>
                                        <div className="flex items-center gap-1.5">
                                            <i data-lucide="calendar" className="w-3 h-3 text-purple-600"></i>
                                            <span className="text-zinc-200 uppercase">{new Date(clip.created_at).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {gameArt &&!showMenu && (
                        <div className="absolute bottom-4 right-4 md:bottom-8 md:right-8 w-16 md:w-28 game-art-float pointer-events-none z-[1]">
                            <div className="p-1 bg-white/10 backdrop-blur-2xl rounded-xl shadow-2xl ring-1 ring-white/20 overflow-hidden">
                                <img src={gameArt} alt="Game Box Art" className="w-full h-auto rounded-lg shadow-lg opacity-90 contrast-[1.1]" />
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
