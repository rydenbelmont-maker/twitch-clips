<!DOCTYPE html>
<html>
<head>
    <title>Ryden Belmont - Clip Scene</title>
    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #player-container { width: 100vw; height: 100vh; }
        
        /* The Invisible Menu - Hover top-left in OBS Interact to see */
        #controls {
            position: absolute; top: 0; left: 0; width: 220px; padding: 15px;
            background: rgba(15, 15, 15, 0.95); color: white; opacity: 0; 
            transition: opacity 0.3s; z-index: 9999; border: 1px solid #9147ff;
        }
        #controls:hover { opacity: 1; }
        .setting { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #adadb8; margin-bottom: 4px; text-transform: uppercase; }
        select, input, button { width: 100%; background: #000; color: white; border: 1px solid #464649; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        button { background: #9147ff; border: none; color: white; padding: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:hover { background: #772ce8; }
        #status { font-size: 10px; color: #9147ff; margin-bottom: 8px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="controls">
        <div id="status">Status: Initializing...</div>
        <div class="setting">
            <label>Filter Mode</label>
            <select id="mode">
                <option value="trending">Top Clips (All Time)</option>
                <option value="fresh">Fresh (Last 7 Days)</option>
                <option value="shuffle">Random Shuffle</option>
            </select>
        </div>
        <div class="setting">
            <label>Exclude Keyword</label>
            <input type="text" id="exclude" placeholder="e.g. 'horror'">
        </div>
        <button onclick="refreshClips()">UPDATE SCENE</button>
    </div>

    <div id="player-container"></div>

    <script>
        const CLIENT_ID = 'mdizqkgtl6tar5h4si6hsikyxcvo1c';
        const ACCESS_TOKEN = 'k1qc1ekg9n61r1h3qa779sposci95t';
        const BROADCASTER_ID = '635887962';

        let clips = [];
        let currentIndex = 0;
        let player = null;

        async function fetchClips() {
            log("Fetching...");
            const mode = document.getElementById('mode').value;
            const excludeTerm = document.getElementById('exclude').value.toLowerCase();
            
            let url = `https://api.twitch.tv/helix/clips?broadcaster_id=${BROADCASTER_ID}&first=100`;

            if (mode === 'fresh') {
                let lastWeek = new Date();
                lastWeek.setDate(lastWeek.getDate() - 7);
                url += `&started_at=${lastWeek.toISOString()}`;
            }

            try {
                const response = await fetch(url, {
                    headers: {
                        'Client-ID': CLIENT_ID,
                        'Authorization': `Bearer ${ACCESS_TOKEN}`
                    }
                });
                const data = await response.json();
                
                if (!data.data || data.data.length === 0) {
                    log("No clips found.");
                    return;
                }

                clips = data.data;

                // Filter
                if (excludeTerm) {
                    clips = clips.filter(c => !c.title.toLowerCase().includes(excludeTerm));
                }

                // Shuffle
                if (mode === 'shuffle') {
                    clips.sort(() => Math.random() - 0.5);
                }

                log(`${clips.length} Clips Loaded`);
                playClip(0);

            } catch (err) {
                log("API Error.");
                console.error(err);
            }
        }

        function playClip(index) {
            const clipId = clips[index].id;
            
            if (!player) {
                player = new Twitch.Player("player-container", {
                    width: '100%',
                    height: '100%',
                    clip: clipId,
                    autoplay: true,
                    muted: false,
                    parent: ["rydenbelmont-maker.github.io"]
                });

                player.addEventListener(Twitch.Player.ENDED, () => {
                    currentIndex = (currentIndex + 1) % clips.length;
                    player.setClip(clips[currentIndex].id);
                });
            } else {
                player.setClip(clipId);
            }
        }

        function refreshClips() {
            currentIndex = 0;
            fetchClips();
        }

        function log(msg) { document.getElementById('status').innerText = "Status: " + msg; }

        window.onload = fetchClips;
    </script>
</body>
</html>
