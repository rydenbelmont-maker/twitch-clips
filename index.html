<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Clip Viewer</title>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #050505; color: #f4f4f5; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        iframe { border: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t'
        };

        const App = () => {
            const [clips, setClips] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [selectedClip, setSelectedClip] = useState(null);
            const [timeFilter, setTimeFilter] = useState('all');

            const fetchClips = useCallback(async () => {
                setLoading(true);
                setError(null);
                try {
                    const params = new URLSearchParams({
                        broadcaster_id: CONFIG.broadcasterId,
                        first: '20',
                    });

                    const now = new Date();
                    if (timeFilter === 'week') {
                        now.setDate(now.getDate() - 7);
                        params.append('started_at', now.toISOString());
                    } else if (timeFilter === 'month') {
                        now.setMonth(now.getMonth() - 1);
                        params.append('started_at', now.toISOString());
                    }

                    const response = await fetch(`https://api.twitch.tv/helix/clips?${params.toString()}`, {
                        headers: {
                            'Client-ID': CONFIG.clientId,
                            'Authorization': `Bearer ${CONFIG.accessToken}`
                        }
                    });

                    if (!response.ok) throw new Error('API Error: check your token');
                    const data = await response.json();
                    setClips(data.data);
                    if (data.data.length > 0) setSelectedClip(data.data[0]);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            }, [timeFilter]);

            useEffect(() => {
                fetchClips();
            }, [fetchClips]);

            const getEmbedUrl = (clip) => {
                if (!clip) return '';
                const host = window.location.hostname;
                // Add current host and your specific GitHub domain as parents
                let url = `${clip.embed_url}&parent=${host}&parent=rydenbelmont-maker.github.io&autoplay=true&muted=false`;
                return url;
            };

            return (
                <div className="min-h-screen">
                    <header className="border-b border-white/5 bg-black/60 backdrop-blur-xl sticky top-0 z-50 px-6 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                                <i data-lucide="play" className="text-white fill-white w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="font-bold text-base">Ryden Belmont</h1>
                                <p className="text-[10px] text-zinc-500 uppercase tracking-widest font-black">Twitch Clips</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            {['all', 'month', 'week'].map(f => (
                                <button 
                                    key={f}
                                    onClick={() => setTimeFilter(f)}
                                    className={`px-3 py-1 rounded-lg text-[10px] font-bold uppercase ${timeFilter === f ? 'bg-zinc-800 text-white' : 'text-zinc-500'}`}
                                >{f}</button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-6 grid lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-8 space-y-6">
                            {selectedClip ? (
                                <div className="space-y-6">
                                    <div className="aspect-video bg-black rounded-[2rem] overflow-hidden shadow-2xl ring-1 ring-white/10">
                                        <iframe 
                                            src={getEmbedUrl(selectedClip)}
                                            className="w-full h-full"
                                            allowFullScreen
                                        ></iframe>
                                    </div>
                                    <div className="bg-zinc-900/30 p-8 rounded-[2rem] border border-white/5">
                                        <h2 className="text-3xl font-black mb-2">{selectedClip.title}</h2>
                                        <div className="flex gap-4 text-xs text-zinc-500 font-bold uppercase">
                                            <span>{selectedClip.view_count.toLocaleString()} Views</span>
                                            <span>•</span>
                                            <span>{new Date(selectedClip.created_at).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="aspect-video bg-zinc-900/20 rounded-[2rem] flex items-center justify-center">
                                    {loading ? "Loading..." : "No clips found"}
                                </div>
                            )}
                        </div>

                        <div className="lg:col-span-4 space-y-4">
                            <h3 className="text-[10px] font-black text-zinc-600 uppercase tracking-widest px-2">Archive</h3>
                            <div className="space-y-3 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                                {clips.map(clip => (
                                    <button 
                                        key={clip.id}
                                        onClick={() => setSelectedClip(clip)}
                                        className={`flex w-full gap-4 p-3 rounded-2xl transition-all border ${selectedClip?.id === clip.id ? 'bg-purple-600/10 border-purple-500/30' : 'border-transparent hover:bg-white/5'}`}
                                    >
                                        <img src={clip.thumbnail_url} className="w-24 h-14 object-cover rounded-lg shadow-lg" />
                                        <div className="text-left overflow-hidden">
                                            <h4 className="text-xs font-bold truncate">{clip.title}</h4>
                                            <p className="text-[10px] text-zinc-500 mt-1">{clip.view_count} views</p>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
