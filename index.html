<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryden Belmont - Twitch Clip Widget</title>
    <!-- Tailwind CSS for modern, rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for UI elements -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        /* OBS requires a transparent background to overlay on your stream */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
            overflow: hidden; /* Prevent scrollbars in OBS */
            font-family: 'Inter', sans-serif;
        }

        /* Iframe styling for 16:9 full coverage */
        #clip-frame {
            width: 100%;
            height: 100%;
            border: 8px solid #facc15; /* Bright yellow border */
            box-sizing: border-box; /* Keeps the border strictly inside the window frame */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Settings button - hidden by default, appears on hover or touch */
        #settings-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        body:hover #settings-trigger {
            opacity: 1;
        }

        /* Settings Modal Styling */
        #settings-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 100;
            backdrop-filter: blur(8px);
            color: white;
            overflow-y: auto;
        }

        #settings-modal.active {
            display: flex;
            flex-direction: column;
        }

        /* Custom Scrollbar for the grid */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>

    <!-- Main Clip Player -->
    <iframe id="clip-frame" allowfullscreen="true" scrolling="no" allow="autoplay; encrypted-media"></iframe>

    <!-- Game Overlay (Bottom Right) -->
    <div id="game-overlay" class="absolute bottom-8 right-8 z-10 opacity-0 transition-opacity duration-500 pointer-events-none flex items-center gap-3 bg-slate-900/85 backdrop-blur-md border border-slate-700/50 p-2 pr-5 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.6)]">
        <img id="overlay-game-art" src="" alt="Game Art" class="w-12 h-16 object-cover rounded shadow-md hidden">
        <div class="flex flex-col">
            <span class="text-xs text-indigo-400 font-bold uppercase tracking-wider">Playing</span>
            <span id="overlay-game-name" class="text-white font-bold text-lg leading-tight drop-shadow-md"></span>
        </div>
    </div>

    <!-- Settings Trigger Button -->
    <button id="settings-trigger" class="bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-full shadow-lg backdrop-blur-md transition-all transform hover:scale-110" onclick="openSettings()">
        <i class="ph ph-gear text-2xl"></i>
    </button>

    <!-- Settings Modal -->
    <div id="settings-modal" class="p-8">
        <div class="max-w-7xl mx-auto w-full flex-grow flex flex-col h-full">
            
            <!-- Header -->
            <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                <div>
                    <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                        <i class="ph-fill ph-twitch-logo text-purple-500"></i> Clip Management
                    </h1>
                    <p id="indexing-status" class="text-slate-400 mt-1 text-sm">Initializing...</p>
                </div>
                <button onclick="closeSettings()" class="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                    <i class="ph ph-x"></i> Close & Apply
                </button>
            </div>

            <!-- Dashboard Stats -->
            <div class="grid grid-cols-3 gap-4 mb-6">
                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
                    <div class="text-slate-400 text-sm">Total Indexed Clips</div>
                    <div id="stat-total" class="text-2xl font-bold text-white">0</div>
                </div>
                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
                    <div class="text-slate-400 text-sm">Pinned Clips (Plays Only These)</div>
                    <div id="stat-pinned" class="text-2xl font-bold text-yellow-400">0</div>
                </div>
                <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
                    <div class="text-slate-400 text-sm">Banned Clips (Skipped)</div>
                    <div id="stat-banned" class="text-2xl font-bold text-red-400">0</div>
                </div>
            </div>

            <!-- Clips Grid -->
            <div id="clips-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 overflow-y-auto pr-2 pb-10">
                <!-- Clips will be injected here via JavaScript -->
            </div>
        </div>
    </div>

    <script>
        /**
         * TECHNICAL CONFIGURATION
         * Based on Ryden Belmont Clip Widget Technical Reference
         */
        const CONFIG = {
            broadcasterId: '635887962',
            clientId: 'mdizqkgtl6tar5h4si6hsikyxcvo1c',
            accessToken: 'k1qc1ekg9n61r1h3qa779sposci95t',
            storageKey: 'ryden_widget_v10_settings',
            baseParents: ['localhost', '127.0.0.1', 'rydenbelmont-maker.github.io', 'obs.twitch.tv']
        };

        // Application State
        let state = {
            clips: [],          // All fetched clips
            playbackQueue: [],  // Valid clips queued for rotation
            currentIndex: -1,   // Current clip index in queue
            rotationTimer: null, // Timeout reference for looping
            hasDeepIndexed: false
        };

        // Cache for Twitch Games API
        let gameCache = {};

        // User Settings (Loaded from LocalStorage)
        let settings = {
            pinned: [], // Array of clip IDs
            banned: []  // Array of clip IDs
        };

        // Initialize Widget
        async function init() {
            loadSettings();
            
            // Initial fetch to start playback quickly (only top 100)
            const result = await fetchClips(100);
            if(result.data.length > 0) {
                state.clips = result.data;
                buildPlaybackQueue();
                playNextClip();
            } else {
                console.error("No clips found or API Error. Please check access token.");
                document.getElementById('indexing-status').innerText = "API Error: Verify token in config.";
            }
        }

        // --- Twitch API Logic ---

        async function fetchClips(limit = 100, cursor = null) {
            let url = `https://api.twitch.tv/helix/clips?broadcaster_id=${CONFIG.broadcasterId}&first=${Math.min(limit, 100)}`;
            if (cursor) url += `&after=${cursor}`;

            try {
                const response = await fetch(url, {
                    headers: {
                        'Client-ID': CONFIG.clientId,
                        'Authorization': `Bearer ${CONFIG.accessToken}`
                    }
                });

                if (!response.ok) {
                    console.error("Twitch API Error:", response.status, await response.text());
                    return { data: [], cursor: null };
                }

                const data = await response.json();
                return {
                    data: data.data,
                    cursor: data.pagination ? data.pagination.cursor : null
                };
            } catch (err) {
                console.error("Network error fetching clips:", err);
                return { data: [], cursor: null };
            }
        }

        async function getGameInfo(gameId) {
            if (!gameId) return null;
            if (gameCache[gameId]) return gameCache[gameId]; // Return from cache if we already fetched it
            try {
                const response = await fetch(`https://api.twitch.tv/helix/games?id=${gameId}`, {
                    headers: {
                        'Client-ID': CONFIG.clientId,
                        'Authorization': `Bearer ${CONFIG.accessToken}`
                    }
                });
                const data = await response.json();
                if (data.data && data.data.length > 0) {
                    gameCache[gameId] = data.data[0];
                    return data.data[0];
                }
            } catch (err) {
                console.error("Error fetching game info:", err);
            }
            return null;
        }

        // "Deep Indexing" -> Fetches up to 1000 clips for the management menu
        async function runDeepIndexing() {
            if (state.hasDeepIndexed) return;
            
            let fetchedCount = 0;
            let currentCursor = null;
            let allFetched = [];
            const statusText = document.getElementById('indexing-status');

            statusText.innerText = 'Deep Indexing started... This may take a moment.';

            while (fetchedCount < 1000) {
                statusText.innerText = `Indexing clips... (${fetchedCount}/1000)`;
                const result = await fetchClips(100, currentCursor);
                
                if (result.data.length === 0) break; // No more clips
                
                allFetched.push(...result.data);
                fetchedCount += result.data.length;
                currentCursor = result.cursor;
                
                if (!currentCursor) break; // End of pagination
            }

            state.clips = allFetched;
            state.hasDeepIndexed = true;
            statusText.innerHTML = `<span class="text-emerald-400"><i class="ph-fill ph-check-circle"></i> Successfully indexed ${state.clips.length} clips.</span>`;
            
            updateStats();
            renderClipsGrid();
        }

        // --- Playback Logic ---

        function buildPlaybackQueue() {
            // Priority 1: If any clips are pinned, ONLY play pinned clips.
            // Priority 2: Otherwise, play all clips EXCEPT banned clips.
            
            // Clean up missing/deleted pins from settings
            const validClipIds = state.clips.map(c => c.id);
            settings.pinned = settings.pinned.filter(id => validClipIds.includes(id));

            if (settings.pinned.length > 0) {
                state.playbackQueue = state.clips.filter(c => settings.pinned.includes(c.id));
            } else {
                state.playbackQueue = state.clips.filter(c => !settings.banned.includes(c.id));
            }

            // Shuffle queue to keep things fresh
            state.playbackQueue = state.playbackQueue.sort(() => Math.random() - 0.5);
            state.currentIndex = -1; // Reset index
        }

        function playNextClip() {
            if (state.playbackQueue.length === 0) {
                console.warn("Playback queue empty. Checking for clips...");
                return; // Nothing to play
            }

            state.currentIndex = (state.currentIndex + 1) % state.playbackQueue.length;
            const clip = state.playbackQueue[state.currentIndex];

            // Safely generate parent parameters based on guidelines
            const host = window.location.hostname;
            const parents = [...CONFIG.baseParents];
            if (host && !parents.includes(host)) {
                parents.push(host);
            }
            const parentString = parents.map(p => `&parent=${p}`).join('');

            // Construct Autoplay URL Pattern
            const iframeUrl = `https://clips.twitch.tv/embed?autoplay=true&clip=${clip.id}&muted=false${parentString}`;
            
            document.getElementById('clip-frame').src = iframeUrl;

            // Handle Game Overlay
            const overlay = document.getElementById('game-overlay');
            const gameNameEl = document.getElementById('overlay-game-name');
            const gameArtEl = document.getElementById('overlay-game-art');

            // Hide immediately when a new clip starts loading
            overlay.classList.add('opacity-0');

            if (clip.game_id) {
                getGameInfo(clip.game_id).then(game => {
                    if (game) {
                        gameNameEl.innerText = game.name;
                        // Replace the templated width/height in the Twitch Box Art URL
                        gameArtEl.src = game.box_art_url.replace('{width}', '60').replace('{height}', '80');
                        gameArtEl.classList.remove('hidden');
                        
                        // Wait briefly before fading in so it appears as the video is playing
                        setTimeout(() => {
                            overlay.classList.remove('opacity-0');
                        }, 800);
                    }
                });
            }

            // Determine when to switch to the next clip
            // Add a 1.5 second buffer for loading over the actual clip duration
            const durationMs = (clip.duration * 1000) + 1500;
            
            clearTimeout(state.rotationTimer);
            state.rotationTimer = setTimeout(playNextClip, durationMs);
        }

        // --- Settings & UI Management ---

        function loadSettings() {
            const saved = localStorage.getItem(CONFIG.storageKey);
            if (saved) {
                try {
                    settings = { ...settings, ...JSON.parse(saved) };
                } catch(e) { console.error("Error parsing settings", e); }
            }
        }

        function saveSettings() {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify(settings));
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.add('active');
            runDeepIndexing(); // Triggers the deep fetch (only runs once)
            updateStats();
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.remove('active');
            saveSettings();
            buildPlaybackQueue();
            
            // If the currently playing clip was just banned, or queue changed drastically, skip forward immediately
            const currentClip = state.playbackQueue[state.currentIndex];
            if(!currentClip || settings.banned.includes(currentClip.id)) {
                playNextClip(); 
            }
        }

        function togglePin(clipId) {
            if (settings.pinned.includes(clipId)) {
                settings.pinned = settings.pinned.filter(id => id !== clipId);
            } else {
                settings.pinned.push(clipId);
                // Cannot be pinned and banned at the same time
                settings.banned = settings.banned.filter(id => id !== clipId); 
            }
            saveSettings();
            renderClipsGrid();
            updateStats();
        }

        function toggleBan(clipId) {
            if (settings.banned.includes(clipId)) {
                settings.banned = settings.banned.filter(id => id !== clipId);
            } else {
                settings.banned.push(clipId);
                // Cannot be pinned and banned at the same time
                settings.pinned = settings.pinned.filter(id => id !== clipId);
            }
            saveSettings();
            renderClipsGrid();
            updateStats();
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = state.clips.length;
            document.getElementById('stat-pinned').innerText = settings.pinned.length;
            document.getElementById('stat-banned').innerText = settings.banned.length;
        }

        function renderClipsGrid() {
            const grid = document.getElementById('clips-grid');
            grid.innerHTML = ''; // Clear

            state.clips.forEach(clip => {
                const isPinned = settings.pinned.includes(clip.id);
                const isBanned = settings.banned.includes(clip.id);

                // Build Card
                const card = document.createElement('div');
                card.className = `relative group rounded-lg overflow-hidden border-2 transition-all duration-200 bg-slate-800 ${
                    isPinned ? 'border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.3)]' : 
                    isBanned ? 'border-red-500 opacity-50' : 'border-slate-700 hover:border-indigo-400'
                }`;

                card.innerHTML = `
                    <div class="relative aspect-video">
                        <img src="${clip.thumbnail_url}" class="w-full h-full object-cover" loading="lazy">
                        
                        ${isBanned ? `<div class="absolute inset-0 bg-red-900/60 flex items-center justify-center backdrop-blur-sm"><i class="ph-fill ph-prohibit text-4xl text-red-400"></i></div>` : ''}
                        
                        <div class="absolute top-2 right-2 flex gap-1">
                            <button onclick="togglePin('${clip.id}')" title="Pin Clip" class="p-2 rounded bg-black/70 hover:bg-black text-white transition">
                                <i class="${isPinned ? 'ph-fill text-yellow-400' : 'ph'} ph-push-pin text-lg"></i>
                            </button>
                            <button onclick="toggleBan('${clip.id}')" title="Ban Clip" class="p-2 rounded bg-black/70 hover:bg-black text-white transition">
                                <i class="${isBanned ? 'ph-fill text-red-500' : 'ph'} ph-prohibit text-lg"></i>
                            </button>
                        </div>
                        
                        <div class="absolute bottom-2 left-2 bg-black/80 px-2 py-1 rounded text-xs text-white font-mono">
                            ${Math.round(clip.duration)}s
                        </div>
                        <div class="absolute bottom-2 right-2 bg-black/80 px-2 py-1 rounded text-xs text-slate-300 flex items-center gap-1">
                            <i class="ph-fill ph-eye"></i> ${clip.view_count.toLocaleString()}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="text-sm font-semibold text-white truncate" title="${clip.title}">${clip.title}</h3>
                        <p class="text-xs text-slate-400 mt-1">${new Date(clip.created_at).toLocaleDateString()}</p>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Start app
        init();

    </script>
</body>
</html>
